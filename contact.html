    body {

      transition: opacity 0.2s;
    }

    header nav a:hover { opacity: 1; }

    main {
      padding: 40px 24px 64px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: var(--gold-light);
      margin-bottom: 8px;
    }

      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(201,168,76,0.2);

<body>
<div class="page">

  <header>
    <div class="logo">Spider <span>Solitaire Pro</span></div>
    <nav style="display:flex;gap:12px;align-items:center">
      <a href="index.html" data-i18n="nav.home">← トップへ</a>
      <button id="lang-toggle" onclick="setLang()" style="background:none;border:1px solid rgba(201,168,76,0.4);color:rgba(245,240,232,0.6);font-size:0.65rem;padding:3px 7px;border-radius:4px;cursor:pointer;letter-spacing:0.08em;font-family:inherit;">EN</button>
    </nav>
  </header>

  <main>
    <h1 data-i18n="title">お問い合わせ</h1>
    <p class="subtitle" data-i18n="subtitle">ご意見・ご要望・バグ報告など、お気軽にどうぞ。<br>通常2〜3営業日以内にご返信いたします。</p>

    <div class="form-wrapper">
      <iframe
        src="https://docs.google.com/forms/d/e/1FAIpQLSdSkNm5uRo1s9dDFzsNXrBIhtacfJH9P7UqPepAHVvPI7uzLw/viewform?embedded=true"
        height="720"
        title="Contact Form">
        Loading…
      </iframe>
    </div>

    <p class="form-note" data-i18n="note">フォームが表示されない場合は <a href="https://forms.gle/UakKGNYJTRu7Q7kd8" target="_blank" rel="noopener" style="color:var(--gold-light);opacity:1">こちら</a> からアクセスしてください。</p>
  </main>

    <p>© 2026 Spider Solitaire Pro &nbsp;|&nbsp; <a href="index.html" data-i18n="footer.home">トップページ</a></p>
  </footer>

<script>
const I18N_CONTACT = {
  ja: {
    'nav.home': '← トップへ',
    'title': 'お問い合わせ',
    'subtitle': 'ご意見・ご要望・バグ報告など、お気軽にどうぞ。\n通常2〜3営業日以内にご返信いたします。',
    'note': 'フォームが表示されない場合は こちら からアクセスしてください。',
    'footer.home': 'トップページ',
  },
  en: {
    'nav.home': '← Home',
    'title': 'Contact',
    'subtitle': 'Feel free to reach out with feedback, feature requests, or bug reports.\nWe typically reply within 2–3 business days.',
    'note': 'If the form does not load, please access it here.',
    'footer.home': 'Top Page',
  }
};

(function() {
  let lang = localStorage.getItem('spider_lang') ||
    (navigator.language.startsWith('ja') ? 'ja' : 'en');

  function applyLang() {
    const dict = I18N_CONTACT[lang] || I18N_CONTACT.ja;
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const val = dict[el.dataset.i18n];
      if (val !== undefined) el.textContent = val;
    });
    const btn = document.getElementById('lang-toggle');
    if (btn) btn.textContent = lang === 'ja' ? 'EN' : 'JP';
    document.documentElement.lang = lang;
    // Update page title
    document.title = lang === 'ja'
      ? 'お問い合わせ - Spider Solitaire Pro'
      : 'Contact - Spider Solitaire Pro';
  }

  window.setLang = function() {
    lang = lang === 'ja' ? 'en' : 'ja';
    localStorage.setItem('spider_lang', lang);
    applyLang();
  };

  applyLang();
})();
</script>
