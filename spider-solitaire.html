<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --green: #1a5c38;
    --green-light: #236b44;
    --green-dark: #0f3a22;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --cream: #f5f0e8;
    --card-bg: #fdf8f0;
    --card-shadow: rgba(0,0,0,0.4);
    --red: #b83232;
    --black: #1a1a1a;
    --hint: #4a9eff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at center, var(--green-light) 0%, var(--green-dark) 100%);
    height: 100vh;
    height: 100dvh;
    font-family: 'DM Mono', monospace;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
    overflow: hidden;
  }

  /* felt texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    background: rgba(0,0,0,0.25);
    border-bottom: 1px solid rgba(201,168,76,0.3);
  }

  .title {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 1.1rem;
    letter-spacing: 2px;
    background: none;
    border: none;
    padding: 4px 4px;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .title:active { opacity: 0.7; }

  .lang-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.4);
    color: rgba(245,240,232,0.6);
    font-size: 0.65rem;
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.08em;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .lang-btn:hover { background: rgba(201,168,76,0.1); }

  .stats {
    display: flex;
    gap: 12px;
    color: rgba(245,240,232,0.8);
    font-size: 0.65rem;
  }

  .stat-item { display: flex; flex-direction: column; align-items: center; }
  .stat-value { color: var(--gold-light); font-size: 0.85rem; font-weight: 500; }

  .streak-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }

  .streak-count {
    font-size: 1.05rem;
    font-weight: 600;
    color: #ff9500;
    letter-spacing: 1px;
  }

  .streak-label {
    color: rgba(245,240,232,0.45);
    font-size: 0.65rem;
  }

  /* TOOLBAR */
  .toolbar {
    padding: 8px 20px;
    background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .toolbar-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .difficulty-selector {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 2px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .diff-label {
    font-size: 0.65rem;
    color: rgba(245,240,232,0.4);
    letter-spacing: 1px;
    margin-right: 2px;
  }
  .diff-btn {
    padding: 5px 10px;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: rgba(245,240,232,0.5);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .diff-btn:hover { border-color: rgba(201,168,76,0.6); color: #e8c96a; }
  .diff-btn.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.2);
    color: #e8c96a;
    font-weight: bold;
  }

  .btn {
    padding: 6px 14px;
    border: 1px solid rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.15);
    color: var(--gold-light);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .btn:hover { background: rgba(201,168,76,0.3); border-color: var(--gold); }
  .btn:active { transform: scale(0.97); }
  .btn.primary { background: rgba(201,168,76,0.35); border-color: var(--gold); }
  .btn.danger { border-color: rgba(184,50,50,0.6); color: #e88; background: rgba(184,50,50,0.15); }
  .btn.danger:hover { background: rgba(184,50,50,0.3); }

  /* GAME AREA */
  #game-area {
    display: flex;
    flex-direction: column;
    padding: 4px 4px;
    gap: 2px;
    flex: 1;
    min-height: 0;
  }

  /* TOP ROW: stock (left) + foundations (right) */
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 6px;
    padding: 0 2px;
    margin-bottom: 2px;
  }

  #foundations {
    display: flex;
    gap: 4px;
    flex: 1;
    justify-content: flex-end;
    flex-wrap: nowrap;
  }

  .foundation-slot {
    height: 40px;
    width: auto;
    aspect-ratio: 7 / 10;
    flex-shrink: 0;
    border: 2px dashed rgba(201,168,76,0.35);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.15);
    font-size: 0.8rem;
    color: rgba(201,168,76,0.4);
    position: relative;
    overflow: hidden;
  }

  .foundation-slot.filled {
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
  }

  .foundation-count {
    position: absolute;
    bottom: 2px;
    right: 3px;
    font-size: 0.55rem;
    color: var(--gold);
    opacity: 0.8;
  }

  /* COLUMNS */
  .columns {
    display: flex;
    gap: clamp(2px, 0.8vw, 5px);
    justify-content: center;
    padding: 0 2px;
    flex: 1;
    min-height: 0;
    align-items: flex-start;
    margin-top: 6px;
  }

  .column {
    flex: 1;
    min-width: 0;
    max-width: 72px;
    min-height: 120px;
    position: relative;
    border-radius: 6px;
  }

  .column-slot {
    width: 100%;
    height: 100px;
    border: 2px dashed rgba(255,255,255,0.12);
    border-radius: 6px;
    position: absolute;
    top: 0;
  }

  /* 列番号（各列内に埋め込み） */
  .col-label {
    position: absolute;
    top: 1px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.65rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
    pointer-events: none;
    z-index: 200;
  }

  /* CARD -------------------------------------------------------- */
  .card {
    position: absolute;
    width: 100%;
    height: 100px;
    background: #fff;
    border-radius: 7px;
    border: 1px solid #bbb;
    box-shadow: 0 2px 5px rgba(0,0,0,0.28);
    cursor: pointer;
    transition: box-shadow 0.1s, transform 0.1s;
    overflow: hidden;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .card:hover { box-shadow: 0 4px 10px rgba(0,0,0,0.38); }

  .card.face-down {
    background: repeating-linear-gradient(
      45deg, #1a5c38 0px, #1a5c38 5px, #1e6840 5px, #1e6840 10px
    );
    border-color: rgba(201,168,76,0.4);
    cursor: default;
  }
  .card.selected {
    box-shadow: 0 0 0 3px var(--hint), 0 4px 16px rgba(74,158,255,0.4);
    transform: translateY(-4px);
  }
  .card.hint-card {
    box-shadow: 0 0 0 3px var(--gold), 0 4px 16px rgba(201,168,76,0.5);
    animation: pulse-hint 0.9s ease-in-out infinite;
  }
  @keyframes pulse-hint {
    0%,100% { box-shadow: 0 0 0 2px var(--gold), 0 4px 14px rgba(201,168,76,0.3); transform: translateY(0); }
    50%     { box-shadow: 0 0 0 4px var(--gold-light), 0 8px 22px rgba(201,168,76,0.6); transform: translateY(-3px); }
  }
  .card.valid-target {
    box-shadow: 0 0 0 3px rgba(74,158,255,0.95), 0 4px 14px rgba(74,158,255,0.3);
    animation: pulse-target 1s ease-in-out infinite;
  }
  .column-slot.valid-target-empty {
    border-color: rgba(74,158,255,0.9) !important;
    background: rgba(74,158,255,0.08);
    animation: pulse-target 1s ease-in-out infinite;
  }
  @keyframes pulse-target {
    0%,100% { box-shadow: 0 0 0 3px rgba(74,158,255,0.7), 0 3px 10px rgba(74,158,255,0.2); }
    50%     { box-shadow: 0 0 0 5px rgba(74,158,255,1.0), 0 6px 18px rgba(74,158,255,0.5); }
  }

  /* ドラッグゴースト */
  #drag-ghost { filter: drop-shadow(0 8px 24px rgba(0,0,0,0.55)); }
  #drag-ghost .card { opacity: 0.92; }

  /* ドラッグ中の有効列ハイライト */
  .column.drag-target .column-slot {
    border-color: rgba(74,158,255,0.9) !important;
    background: rgba(74,158,255,0.10);
    animation: pulse-target 1s ease-in-out infinite;
  }

  /* 上部ストリップ：重なっても常に見える帯 */
  .card-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 32px;
    display: flex;
    align-items: center;
    padding: 0 3px;
    gap: 1px;
    overflow: hidden;
  }
  .card-top-rank {
    font-size: 1.25rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  .card-top-rank.rank-10 {
    font-size: 1.0rem;
    letter-spacing: -0.5px;
  }
  .card-top-suit {
    font-size: 1.1rem;
    font-weight: 900;
    line-height: 1;
    flex-shrink: 0;
  }

  /* 最前面カード専用：中央に大きなスーツ */
  .card-center-suit {
    display: none;
  }
  .card.card-front .card-center-suit {
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -38%);
    font-size: 3.2rem;
    line-height: 1;
    opacity: 0.92;
  }
  .card.card-front .card-top-rank { font-size: 1.55rem; letter-spacing: -0.5px; }
  .card.card-front .card-top-rank.rank-10 { font-size: 1.15rem; letter-spacing: -0.5px; }
  .card.card-front .card-top-suit { font-size: 1.4rem; }

  .red   { color: #dd0000; }
  .black { color: #000; }

  /* STOCK */
  .stock-area {
    display: flex;
    flex-shrink: 0;
  }

  .stock-pile {
    width: 52px;
    height: 52px;
    border-radius: 6px;
    position: relative;
    cursor: pointer;
  }

  .stock-card {
    position: absolute;
    width: 52px;
    height: 52px;
    background: repeating-linear-gradient(
      135deg,
      #1a5c38,
      #1a5c38 4px,
      #1e6840 4px,
      #1e6840 8px
    );
    border-radius: 6px;
    border: 1px solid rgba(201,168,76,0.3);
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    transition: transform 0.1s;
  }

  .stock-card:hover { transform: translateY(-2px); }

  .stock-count {
    position: absolute;
    bottom: 3px;
    width: 100%;
    text-align: center;
    color: rgba(245,240,232,0.85);
    font-size: 0.62rem;
    line-height: 1.35;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 400;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: linear-gradient(145deg, #1e2d1e, #0f1a0f);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 12px;
    padding: 32px;
    max-width: 360px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }

  .modal h2 {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light);
    font-size: 1.6rem;
    margin-bottom: 12px;
  }

  .modal p {
    color: rgba(245,240,232,0.7);
    font-size: 0.8rem;
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .modal .btn-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* AD MODAL */
  .ad-box {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 20px;
    margin: 16px 0;
    color: rgba(245,240,232,0.5);
    font-size: 0.75rem;
  }

  .ad-timer {
    font-size: 1.8rem;
    color: var(--gold);
    font-weight: 700;
    margin: 8px 0;
  }

  /* AIコーチ ハイライト */
  .card.coach-hint {
    box-shadow: 0 0 0 3px #ffd84d, 0 4px 18px rgba(255,216,77,0.5);
    animation: coach-pulse 1s ease-in-out infinite;
    z-index: 50 !important;
  }
  .card.coach-target {
    box-shadow: 0 0 0 3px #4ade80, 0 4px 14px rgba(74,222,128,0.4);
    animation: coach-pulse-green 1s ease-in-out infinite;
  }
  .column-slot.coach-target-empty {
    border-color: #4ade80 !important;
    background: rgba(74,222,128,0.1);
    animation: coach-pulse-green 1s ease-in-out infinite;
  }
  @keyframes coach-pulse {
    0%,100% { box-shadow: 0 0 0 3px #ffd84d, 0 4px 14px rgba(255,216,77,0.4); }
    50%      { box-shadow: 0 0 0 5px #ffe566, 0 6px 22px rgba(255,216,77,0.7); }
  }
  @keyframes coach-pulse-green {
    0%,100% { box-shadow: 0 0 0 3px #4ade80, 0 4px 14px rgba(74,222,128,0.3); }
    50%      { box-shadow: 0 0 0 5px #6ef0a0, 0 6px 22px rgba(74,222,128,0.6); }
  }

  /* AI COACH BAR -------------------------------------------- */
  #ai-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(180deg, #0d1a0d, #080f08);
    border-top: 1px solid rgba(201,168,76,0.3);
    z-index: 150;
    font-family: 'DM Mono', monospace;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* リサイズハンドル */
  #ai-resize-handle {
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: ns-resize;
    flex-shrink: 0;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  #ai-resize-handle::after {
    content: '';
    width: 40px;
    height: 4px;
    background: rgba(255,255,255,0.3);
    border-radius: 2px;
    transition: background 0.15s;
  }
  #ai-resize-handle:hover::after { background: rgba(255,255,255,0.55); }

  /* クイックボタン行 */
  #ai-quick-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    overflow-x: auto;
    scrollbar-width: none;
    flex-shrink: 0;
  }
  #ai-quick-row::-webkit-scrollbar { display: none; }

  #ai-label {
    font-size: 0.65rem;
    color: var(--gold);
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }

  .ai-quick {
    padding: 5px 11px;
    border: 1px solid rgba(201,168,76,0.35);
    background: rgba(201,168,76,0.08);
    color: rgba(245,240,232,0.75);
    font-size: 0.68rem;
    border-radius: 20px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .ai-quick:hover, .ai-quick:active {
    background: rgba(201,168,76,0.25);
    color: var(--cream);
  }

  .ai-hint-btn {
    border-color: rgba(201,168,76,0.5);
    color: var(--gold-light);
    padding: 7px 20px;
    font-size: 0.75rem;
    flex: 1;
  }
  .ai-consult-btn {
    border-color: rgba(74,158,255,0.5);
    background: rgba(74,158,255,0.08);
    color: rgba(74,158,255,0.9);
    padding: 7px 20px;
    font-size: 0.75rem;
    flex: 1;
  }
  .ai-consult-btn:hover, .ai-consult-btn:active {
    background: rgba(74,158,255,0.2);
    color: #6ab4ff;
  }

  /* アドバイス表示エリア（タップ後に展開） */
  #ai-advice-box {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    border-top: 0px solid rgba(201,168,76,0.15);
    flex: 1;
    min-height: 0;
  }
  #ai-advice-box.open {
    max-height: 70vh;
    border-top-width: 1px;
  }

  #ai-advice-inner {
    padding: 10px 14px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    overflow-y: auto;
    max-height: 40vh;
  }

  #ai-advice-icon {
    font-size: 1.1rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  #ai-advice-text {
    font-size: 0.73rem;
    line-height: 1.6;
    color: var(--cream);
    flex: 1;
    white-space: pre-wrap;
  }

  #ai-advice-close {
    background: none;
    border: none;
    color: rgba(245,240,232,0.4);
    cursor: pointer;
    font-size: 0.9rem;
    flex-shrink: 0;
    padding: 0 2px;
    line-height: 1;
  }
  #ai-advice-close:hover { color: var(--cream); }

  /* iOS PWA INSTALL BANNER */
  #pwa-banner {
    position: fixed;
    bottom: 44px;
    left: 0;
    right: 0;
    z-index: 200;
    background: linear-gradient(135deg, #1a5c38 0%, #0f3a22 100%);
    border-top: 1px solid rgba(201,168,76,0.5);
    padding: 10px 16px 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    transform: translateY(calc(100% + 44px));
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  #pwa-banner.visible { transform: translateY(0); }
  #pwa-banner-text {
    flex: 1;
    font-size: 0.75rem;
    color: var(--cream);
    line-height: 1.6;
  }
  #pwa-banner-text strong {
    display: block;
    color: var(--gold-light);
    font-size: 0.8rem;
    margin-bottom: 2px;
  }
  #pwa-banner-text .pwa-hint {
    opacity: 0.75;
    font-size: 0.7rem;
  }
  #pwa-banner-close {
    background: none;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    color: var(--gold);
    width: 26px;
    height: 26px;
    font-size: 0.75rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  #pwa-banner-close:active { background: rgba(201,168,76,0.2); }

  /* ゲームエリアに下部バー分のパディング */
  #app { padding-bottom: 44px; }

  /* TOAST */
  #toast {
    position: fixed;
    bottom: 55px;
    left: 50%;
    transform: translateX(-50%) translateY(40px);
    background: rgba(15,58,34,0.95);
    border: 1px solid var(--gold);
    color: var(--cream);
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 0.8rem;
    transition: transform 0.3s ease, opacity 0.3s ease;
    z-index: 200;
    white-space: nowrap;
    opacity: 0;
  }
  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* WIN */
  .win-stars {
    font-size: 2.5rem;
    margin: 10px 0;
    animation: spin-once 0.6s ease;
  }

  @keyframes spin-once {
    from { transform: rotate(-20deg) scale(0.5); opacity: 0; }
    to { transform: rotate(0) scale(1); opacity: 1; }
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0;
    text-align: left;
  }

  .stats-grid .s-label {
    color: rgba(245,240,232,0.5);
    font-size: 0.7rem;
  }

  .stats-grid .s-val {
    color: var(--gold-light);
    font-size: 0.9rem;
  }

  .best-section {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    margin: 4px 0 12px;
    font-size: 0.75rem;
  }

  .best-section-title {
    color: rgba(245,240,232,0.45);
    font-size: 0.65rem;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .best-row {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }

  .best-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    flex: 1;
    min-width: 60px;
  }

  .best-item .b-label { color: rgba(245,240,232,0.45); font-size: 0.65rem; }
  .best-item .b-val   { color: var(--gold-light); font-size: 0.85rem; }
  .best-item .b-val.new-record { color: #4ade80; }

  .new-record-badge {
    display: inline-block;
    background: rgba(74,222,128,0.15);
    border: 1px solid rgba(74,222,128,0.4);
    color: #4ade80;
    font-size: 0.75rem;
    border-radius: 6px;
    padding: 4px 10px;
    margin-bottom: 8px;
    animation: spin-once 0.5s ease;
  }

  /* RANKING MODAL */
  .modal.wide { max-width: 480px; }

  .rank-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 14px;
  }

  .rank-tab {
    flex: 1;
    padding: 7px 4px;
    border: 1px solid rgba(201,168,76,0.3);
    background: transparent;
    color: rgba(245,240,232,0.5);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
  }

  .rank-tab.active {
    border-color: var(--gold);
    background: rgba(201,168,76,0.2);
    color: var(--gold-light);
    font-weight: bold;
  }

  .rank-panel { display: none; text-align: left; }
  .rank-panel.active { display: block; }

  .rank-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }

  .rank-summary-item {
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(201,168,76,0.12);
    border-radius: 6px;
    padding: 10px 12px;
  }

  .rank-summary-item .r-label {
    font-size: 0.65rem;
    color: rgba(245,240,232,0.4);
    margin-bottom: 4px;
  }

  .rank-summary-item .r-val {
    font-size: 0.95rem;
    color: var(--gold-light);
  }

  .rank-history-title {
    font-size: 0.65rem;
    color: rgba(245,240,232,0.4);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .rank-history-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.75rem;
  }

  .rank-history-table th {
    color: rgba(245,240,232,0.4);
    font-size: 0.65rem;
    padding: 4px 6px;
    text-align: center;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }

  .rank-history-table td {
    color: var(--cream);
    padding: 6px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .rank-history-table tr:last-child td { border-bottom: none; }

  .rank-no-data {
    text-align: center;
    color: rgba(245,240,232,0.3);
    font-size: 0.85rem;
    padding: 28px 0;
  }

  /* DEAL ANIMATION - 山札から飛んでくる */
  .card.dealing {
    animation: deal-fly 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
  }

  @keyframes deal-fly {
    0%   { opacity: 0.9; transform: translateX(var(--deal-dx)) translateY(var(--deal-dy)) scale(0.75) rotate(var(--deal-rot)); z-index: 999; }
    70%  { opacity: 1; transform: translateX(0) translateY(-6px) scale(1.04) rotate(0.5deg); }
    100% { opacity: 1; transform: translateX(0) translateY(0) scale(1) rotate(0deg); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

  @media (max-width: 600px) {
    .title { font-size: 0.95rem; letter-spacing: 1px; }
    .stats { gap: 8px; }
    header { padding: 5px 10px; }
  }

  /* ── Review Overlay ─────────────────────────────────────── */
  #review-overlay { font-family: 'DM Mono', monospace; color: var(--cream); }
  .rv-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: rgba(0,0,0,0.4);
    border-bottom: 1px solid rgba(201,168,76,0.3); flex-shrink: 0;
  }
  .rv-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--gold-light); }
  .rv-subtitle { font-size: 0.7rem; opacity: 0.6; margin-top: 2px; }
  .rv-close {
    background: none; border: 1px solid rgba(255,255,255,0.25);
    color: var(--cream); font-size: 1rem; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  /* ② タイムライン：横スクロールチップ形式 */
  .rv-timeline {
    display: flex; gap: 6px; padding: 6px 12px; overflow-x: auto;
    flex-shrink: 0; -webkit-overflow-scrolling: touch; scrollbar-width: none;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .rv-timeline::-webkit-scrollbar { display: none; }
  .rv-tp {
    display: flex; flex-direction: row; align-items: center; gap: 4px;
    padding: 4px 10px; border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px; cursor: pointer; flex-shrink: 0;
    font-size: 0.65rem; white-space: nowrap;
    background: rgba(255,255,255,0.05); transition: border-color 0.15s, background 0.15s;
  }
  .rv-tp.active { border-color: var(--gold); background: rgba(201,168,76,0.2); }
  .rv-tp.has-ai::after { content: '🤖'; font-size: 0.55rem; margin-left: 2px; }
  .rv-tp .tp-icon { font-size: 0.85rem; line-height: 1; }
  .rv-tp .tp-move { color: var(--gold); font-weight: 700; }
  .rv-tp .tp-reason { display: none; }
  /* ③ ナビ：盤面直下に小さくまとめる */
  .rv-nav {
    display: flex; align-items: center; gap: 6px; padding: 5px 12px;
    flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.3);
  }
  .rv-nav-btn {
    background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.4);
    color: var(--gold-light); font-size: 0.8rem; width: 32px; height: 32px;
    border-radius: 5px; cursor: pointer; flex-shrink: 0;
  }
  .rv-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .rv-move-info { flex: 1; text-align: center; }
  .rv-move-num { font-size: 0.65rem; color: var(--gold); margin-bottom: 1px; }
  .rv-move-desc { font-size: 0.68rem; opacity: 0.8; }
  /* 盤面 */
  .rv-board-wrap { flex: 1; overflow: hidden; position: relative; min-height: 80px; }
  .rv-board-inner { position: absolute; width: 720px; transform-origin: top left; }
  .rv-preview-foundations {
    display: flex; gap: 4px; justify-content: center; padding: 4px 8px;
    background: rgba(0,0,0,0.25); border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .rv-preview-columns {
    display: flex; gap: 3px; padding: 0 4px; align-items: flex-start; margin-top: 10px;
  }
  /* ④ AIセクション：スクロール可能エリア */
  .rv-ai-section {
    padding: 8px 14px; flex-shrink: 0; overflow-y: auto; max-height: 38vh;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  #review-ai-text {
    margin-top: 8px; font-size: 0.75rem; line-height: 1.7;
    opacity: 0.9; white-space: pre-wrap; display: none;
  }
  #rv-ai-loading { margin-top: 6px; font-size: 0.7rem; opacity: 0.55; display: none; }
  .rv-ai-jumps { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-top: 8px; }
  .rv-ai-jumps-label { font-size: 0.65rem; opacity: 0.55; }
  .rv-ai-jump-chip {
    background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.35);
    border-radius: 4px; padding: 3px 9px; font-size: 0.68rem; color: var(--gold);
    cursor: pointer; transition: background 0.15s;
  }
  .rv-ai-jump-chip:hover { background: rgba(201,168,76,0.25); }
  .rv-ai-jump-chip.current { border-color: var(--gold); background: rgba(201,168,76,0.28); font-weight: 700; }
  /* ⑤ フッター：固定表示 */
  .rv-footer {
    padding: 10px 12px; display: flex; justify-content: center; gap: 8px;
    flex-shrink: 0; border-top: 1px solid rgba(255,255,255,0.1); background: #000;
    position: sticky; bottom: 0;
  }
  .rv-footer .btn { flex: 1; max-width: 200px; font-size: 0.75rem; }

  /* START SCREEN */
  #start-screen {
    position: fixed; inset: 0; z-index: 300;
    background: radial-gradient(ellipse at center, #236b44 0%, #0f3a22 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace;
  }
  #start-screen::before {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
  }
  .ss-inner {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 24px; padding: 40px 28px; width: 100%; max-width: 360px;
  }
  .ss-title {
    font-family: 'Playfair Display', serif;
    color: var(--gold-light); font-size: clamp(2rem, 8vw, 3rem);
    text-align: center; line-height: 1.2;
  }
  .ss-diff-label {
    font-size: 0.62rem; color: rgba(245,240,232,0.35); letter-spacing: 3px;
    text-align: center; margin-bottom: -12px; width: 100%;
  }
  .ss-diff-row {
    display: flex; gap: 10px; width: 100%;
  }
  .ss-diff-btn {
    flex: 1; padding: 14px 6px;
    border: 1px solid rgba(201,168,76,0.25); border-radius: 8px;
    background: rgba(0,0,0,0.2); color: rgba(245,240,232,0.55);
    font-family: 'DM Mono', monospace; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.15s; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    -webkit-tap-highlight-color: transparent;
  }
  .ss-diff-btn:active { transform: scale(0.96); }
  .ss-diff-btn.active {
    border-color: var(--gold); background: rgba(201,168,76,0.18);
    color: var(--gold-light); box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }
  .ss-diff-sub { font-size: 0.6rem; font-weight: 400; opacity: 0.7; letter-spacing: 0.5px; }
  .ss-current-badge {
    font-size: 0.52rem; color: var(--gold); border: 1px solid rgba(201,168,76,0.55);
    border-radius: 3px; padding: 1px 5px; letter-spacing: 0.3px; white-space: nowrap;
  }
  .ss-action-col {
    display: flex; flex-direction: column; gap: 10px; width: 100%;
  }
  .ss-start-btn {
    width: 100%; padding: 16px;
    background: rgba(201,168,76,0.28); border: 1px solid var(--gold);
    color: var(--gold-light); font-family: 'DM Mono', monospace;
    font-size: 0.95rem; font-weight: 700;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 3px; -webkit-tap-highlight-color: transparent;
  }
  .ss-start-btn:active { background: rgba(201,168,76,0.45); transform: scale(0.98); }
  .ss-today-btn {
    width: 100%; padding: 13px;
    border: 1px solid rgba(255,200,50,0.45); background: rgba(255,200,50,0.08);
    color: #ffd84d; font-family: 'DM Mono', monospace; font-size: 0.85rem;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 1px; -webkit-tap-highlight-color: transparent;
  }
  .ss-today-btn:active { background: rgba(255,200,50,0.22); transform: scale(0.98); }
  .ss-resume-btn {
    width: 100%; padding: 13px;
    border: 1px solid rgba(74,158,255,0.4); background: rgba(74,158,255,0.07);
    color: rgba(74,158,255,0.85); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 1px; -webkit-tap-highlight-color: transparent;
  }
  .ss-resume-btn:active { background: rgba(74,158,255,0.2); transform: scale(0.98); }
  .ss-home-btn {
    width: 100%; padding: 13px;
    border: 1px solid rgba(245,240,232,0.15); background: rgba(255,255,255,0.05);
    color: rgba(245,240,232,0.5); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
    letter-spacing: 1px; -webkit-tap-highlight-color: transparent;
  }
  .ss-home-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.98); }
  .ss-footer-row {
    display: flex; align-items: center; gap: 16px;
  }
  .ss-lang-btn {
    background: none; border: 1px solid rgba(201,168,76,0.3);
    color: rgba(245,240,232,0.45); font-size: 0.65rem; padding: 4px 10px;
    border-radius: 4px; cursor: pointer; letter-spacing: 0.1em;
    -webkit-tap-highlight-color: transparent;
  }
  .ss-records-link {
    background: none; border: none; color: rgba(245,240,232,0.4);
    font-size: 0.72rem; cursor: pointer; font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px; padding: 4px 8px;
    -webkit-tap-highlight-color: transparent;
  }
  .ss-records-link:active { color: var(--gold); }
</style>
</head>
<body>
<div id="app">
  <header>
    <button class="title" onclick="confirmGoHome()">♠ SPIDER SOLITAIRE</button>
    <div class="streak-display" id="streak-display" style="display:none">
      <span class="streak-count">🔥<span id="stat-streak">0</span></span>
      <span class="streak-label" data-i18n="stat.streak">連続</span>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="stats">
        <div class="stat-item">
          <span class="stat-value" id="stat-moves">0</span>
          <span data-i18n="stat.moves">手数</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-time">0:00</span>
          <span data-i18n="stat.time">経過</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-score">500</span>
          <span data-i18n="stat.score">スコア</span>
        </div>
        <div class="stat-item">
          <span class="stat-value" id="stat-cleared">0/8</span>
          <span data-i18n="stat.cleared">完成</span>
        </div>
      </div>
      <button id="lang-toggle" class="lang-btn" onclick="setLang(currentLang==='ja'?'en':'ja')">EN</button>
    </div>
  </header>

  <div class="toolbar">
    <div class="toolbar-row">
      <button id="btn-giveup" class="btn danger" onclick="confirmGiveUp()" data-i18n="btn.giveup">🏳 ギブアップ</button>
      <button class="btn" onclick="undoMove()" data-i18n="btn.undo">↩ 戻す</button>
      <button class="btn" onclick="showStartScreen()" data-i18n="btn.settings">⚙️ 設定</button>
    </div>
  </div>

  <div id="game-area">
    <div class="top-row">
      <div id="stock-area"></div>
      <div id="foundations"></div>
    </div>
    <div class="columns" id="columns"></div>
  </div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal" id="modal-content"></div>
</div>

<div id="toast"></div>

<!-- iOS PWA INSTALL BANNER -->
<div id="pwa-banner">
  <div id="pwa-banner-text">
    <strong data-i18n="pwa.title">📲 ホーム画面に追加するとアプリとして使えます</strong>
    <span class="pwa-hint" data-i18n="pwa.hint">Safari の 共有ボタン → ホーム画面に追加</span>
  </div>
  <button id="pwa-banner-close" onclick="dismissPwaBanner()">✕</button>
</div>

<!-- AI COACH BAR -->
<div id="ai-bar">
  <div id="ai-resize-handle"></div>
  <div id="ai-quick-row">
    <button class="ai-quick ai-hint-btn" onclick="showAllHints()" data-i18n="btn.hint">💡 ヒント</button>
    <button class="ai-quick ai-consult-btn" onclick="askAi(t('ai.question'))" data-i18n="btn.consult">🤖 AIに相談</button>
  </div>
  <div id="ai-advice-box">
    <div id="ai-advice-inner">
      <span id="ai-advice-icon">🤖</span>
      <span id="ai-advice-text"></span>
      <button id="ai-advice-close" onclick="closeAdvice()">✕</button>
    </div>
  </div>
</div>

<!-- START SCREEN -->
<div id="start-screen" style="display:none">
  <div class="ss-inner">
    <div class="ss-title">Spider<br>Solitaire Pro</div>
    <p class="ss-diff-label" data-i18n="ss.diff.label">難易度</p>
    <div class="ss-diff-row">
      <button class="ss-diff-btn" id="ss-1" onclick="selectStartDiff(1)">
        1♠<span class="ss-diff-sub" data-i18n="ss.easy">かんたん</span>
        <span class="ss-current-badge" id="ss-badge-1" style="display:none" data-i18n="ss.currentDiff">現在の難易度</span>
      </button>
      <button class="ss-diff-btn" id="ss-2" onclick="selectStartDiff(2)">
        2♠<span class="ss-diff-sub" data-i18n="ss.normal">ふつう</span>
        <span class="ss-current-badge" id="ss-badge-2" style="display:none" data-i18n="ss.currentDiff">現在の難易度</span>
      </button>
      <button class="ss-diff-btn" id="ss-4" onclick="selectStartDiff(4)">
        4♠<span class="ss-diff-sub" data-i18n="ss.hard">むずかしい</span>
        <span class="ss-current-badge" id="ss-badge-4" style="display:none" data-i18n="ss.currentDiff">現在の難易度</span>
      </button>
    </div>
    <div class="ss-action-col">
      <button class="ss-start-btn" onclick="startFromScreen()" data-i18n="ss.start">GAME START</button>
      <button class="ss-today-btn" onclick="startTodayFromScreen()" data-i18n="ss.today">📅 今日の問題</button>
      <button class="ss-resume-btn" id="ss-resume-btn" onclick="hideStartScreen()" style="display:none" data-i18n="ss.resume">▶ ゲームを再開</button>
      <button class="ss-home-btn" onclick="location.href='index.html'" data-i18n="ss.home">🏠 トップページへ</button>
    </div>
    <div class="ss-footer-row">
      <button class="ss-lang-btn" id="ss-lang-toggle" onclick="setLang(currentLang==='ja'?'en':'ja')">EN</button>
      <button class="ss-records-link" onclick="showRanking()" data-i18n="ss.records">🏆 記録</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// I18N
// ============================================================

let currentLang = localStorage.getItem('spider_lang') ||
  (navigator.language.startsWith('ja') ? 'ja' : 'en');

function t(key, ...args) {
  const dict = I18N[currentLang] || I18N.ja;
  let str = dict[key] ?? I18N.ja[key] ?? key;
  args.forEach((a, i) => { str = str.replaceAll(`{${i}}`, a); });
  return str;
}

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('spider_lang', lang);
  applyLang();
  render();
}

function applyLang() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = currentLang === 'ja' ? 'EN' : 'JP';
  const ssBtn = document.getElementById('ss-lang-toggle');
  if (ssBtn) ssBtn.textContent = currentLang === 'ja' ? 'EN' : 'JP';
  updateStartBtnLabel();
}

let gameHistory = [];

function calcMetrics() {
  return {
    hiddenCards: state.columns.reduce((s, col) => s + col.filter(c => !c.faceUp).length, 0),
    emptyColumns: state.columns.filter(col => col.length === 0).length,
    score: state.score,
  };
}

function pushGameHistory(entry) {
  // 上限1000件：先頭（手0）は保持しつつ古い差分を削除
  if (gameHistory.length >= 1000) {
    gameHistory.splice(1, 1);
  }
  gameHistory.push(entry);
}

function makeGameHistoryEntry(type, description, changedCols) {
  const entry = {
    moveNumber: state.moves,
    type,
    description,
    changedCols,
    stockLength: state.stock.length,
    foundationsLength: state.foundations.length,
    metrics: calcMetrics(),
  };
  // 50手ごとにチェックポイント（フルスナップショット）を保存
  if (state.moves % 50 === 0) {
    entry.fullSnapshot = {
      columns: state.columns.map(col => col.map(c => ({...c}))),
      stock: state.stock.map(pile => pile.map(c => ({...c}))),
      stockLength: state.stock.length,
      foundationsLength: state.foundations.length,
    };
  }
  return entry;
}

function initGameHistory() {
  gameHistory = [];
  // 手0：フルスナップショット
  gameHistory.push({
    moveNumber: 0,
    type: 'start',
    description: currentLang === 'en' ? 'Game start' : 'ゲーム開始',
    fullSnapshot: {
      columns: state.columns.map(col => col.map(c => ({...c}))),
      stock: state.stock.map(pile => pile.map(c => ({...c}))),
      stockLength: state.stock.length,
      foundationsLength: state.foundations.length,
    },
    metrics: calcMetrics(),
  });
}

const STATS_KEY = 'spider_stats_v1';
const GAME_STATE_KEY = 'spider_game_v1';
const GAME_HISTORY_KEY = 'spider_history_v1';
const DIFFICULTY_KEY = 'spider_difficulty_v1';
const LAUNCH_KEY = 'spider_launch_v1';

// ゲーム状態をlocalStorageに保存
function saveGameState() {
  if (!state.columns.length) return;
  const elapsed = state.startTime ? Math.floor((Date.now() - state.startTime) / 1000) : 0;
  try {
    localStorage.setItem(GAME_STATE_KEY, JSON.stringify({
      columns:     state.columns,
      stock:       state.stock,
      foundations: state.foundations,
      history:     state.history,
      moves:       state.moves,
      score:       state.score,
      elapsed,
      hintUsed:    state.hintUsed,
      adUsed:      state.adUsed,
      cleared:     state.cleared,
      gameOver:    state.gameOver,
      difficulty:  state.difficulty,
      isToday:     state.isToday || false,
      problemIdx:  currentProblemIdx,
    }));
    localStorage.setItem(GAME_HISTORY_KEY, JSON.stringify(gameHistory));
  } catch(e) {}
}

// localStorageからゲーム状態を復元
function loadGameState() {
  try {
    const raw = localStorage.getItem(GAME_STATE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (!d?.columns?.length) return false;
    // クリア済みなら復元しない
    if (d.gameOver) {
      localStorage.removeItem(GAME_STATE_KEY);
      localStorage.removeItem(GAME_HISTORY_KEY);
      return false;
    }

    clearInterval(state.timerInterval);
    currentProblemIdx = d.problemIdx ?? 0;
    currentDifficulty = d.difficulty ?? 4;

    state = {
      columns:     d.columns,
      stock:       d.stock       || [],
      foundations: d.foundations || [],
      history:     d.history     || [],
      moves:       d.moves       || 0,
      score:       d.score       ?? 1000,
      startTime:   Date.now() - (d.elapsed || 0) * 1000,
      timerInterval: setInterval(updateTimer, 1000),
      hintUsed:    d.hintUsed    || 0,
      adUsed:      d.adUsed      || 0,
      cleared:     d.cleared     || 0,
      gameOver:    false,
      difficulty:  d.difficulty  || 4,
      isToday:     d.isToday     || false,
    };

    // 難易度ボタン同期
    [1, 2, 4].forEach(n => {
      document.getElementById(`diff-${n}`)?.classList.toggle('active', n === currentDifficulty);
    });

    render();
    updateStats();
    updateTimer();
    // 保存済み履歴を復元、なければ現在盤面を起点に初期化
    try {
      const savedHistory = localStorage.getItem(GAME_HISTORY_KEY);
      gameHistory = savedHistory ? JSON.parse(savedHistory) : [];
    } catch(e) { gameHistory = []; }
    if (gameHistory.length === 0) initGameHistory();
    return true;
  } catch(e) {
    return false;
  }
}

function loadStats() {
  try { return JSON.parse(localStorage.getItem(STATS_KEY)) || {}; }
  catch { return {}; }
}

function saveStats(difficulty, moves, elapsed, score) {
  const stats = loadStats();
  const key = String(difficulty);
  const d = stats[key] || { clears: 0, bestMoves: null, bestTime: null, bestScore: null, history: [] };
  if (!d.history) d.history = [];

  d.clears++;
  const newRecords = [];

  if (d.bestMoves === null || moves < d.bestMoves) {
    d.bestMoves = moves;
    newRecords.push('moves');
  }
  if (d.bestTime === null || elapsed < d.bestTime) {
    d.bestTime = elapsed;
    newRecords.push('time');
  }
  if (d.bestScore === null || score > d.bestScore) {
    d.bestScore = score;
    newRecords.push('score');
  }

  // 直近5件の履歴を保存
  const dateLabel = getTodayDateString().replace(/(\d{4})(\d{2})(\d{2})/, '$1/$2/$3');
  d.history.push({ date: dateLabel, moves, time: elapsed, score });
  if (d.history.length > 5) d.history.shift();

  stats[key] = d;

  if (state.isToday) {
    stats.todayClear = { date: getTodayDateString() };
  }

  localStorage.setItem(STATS_KEY, JSON.stringify(stats));
  return { record: d, newRecords };
}

function isTodayCleared() {
  const stats = loadStats();
  return stats.todayClear?.date === getTodayDateString();
}

function getYesterdayString() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function updateTodayStreak() {
  const stats = loadStats();
  const todayStr = getTodayDateString();

  // 今日すでにカウント済みなら加算しない
  if (stats.streakLastDate === todayStr) {
    renderStreak();
    return;
  }

  const count = stats.streakLastDate === getYesterdayString()
    ? (stats.streakCount || 0) + 1
    : 1;

  stats.streakCount    = count;
  stats.streakLastDate = todayStr;
  localStorage.setItem(STATS_KEY, JSON.stringify(stats));

  renderStreak();
  setTimeout(() => showToast(t('toast.streak', count)), 900);
}

function renderStreak() {
  const stats = loadStats();
  const count = stats.streakCount || 0;
  const el = document.getElementById('streak-display');
  if (!el) return;
  if (count === 0) {
    el.style.display = 'none';
  } else {
    el.style.display = '';
    document.getElementById('stat-streak').textContent = count;
  }
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

// ============================================================
function getTodayDateString() {
  const d = new Date();
  return `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
}

function getTodaySeed() {
  // 日付文字列を数値に変換してシードに使う
  const dateStr = getTodayDateString();
  let hash = 0;
  for (let i = 0; i < dateStr.length; i++) {
    hash = (hash * 31 + dateStr.charCodeAt(i)) & 0xffffffff;
  }
  return Math.abs(hash);
}

function startTodayChallenge() {
  if (state.moves > 0 && !state.gameOver) {

// ============================================================
// PROBLEM SET  (pre-seeded solvable games using known seeds)
// ============================================================
const PROBLEM_SEEDS = [
     42,   137,   256,   891,  1024,  2048,  3141,  5678,  9999, 11111,
  22222, 33333, 44444, 55555, 66666, 77777, 88888, 99999, 12345, 54321,
  19283, 74651, 38472, 92817, 56473, 10293, 84726, 47382, 65748, 29374,
  83921, 47263, 15678, 93042, 62817, 74920, 38156, 51739, 87264, 20483,
  63917, 42058, 71836, 94205, 38471, 15926, 82047, 59163, 74820, 36195,
  48273, 91560, 25847, 63091, 78432, 14759, 92673, 47018, 83625, 59240,
  71483, 26950, 48371, 95026, 63748, 17294, 80563, 42917, 75830, 29146,
  53872, 96041, 38159, 74623, 19084, 62537, 87410, 45926, 73018, 26495,
  59371, 84026, 17463, 93850, 42617, 76084, 31952, 68207, 94531, 20876,
  57139, 83604, 29175, 46823, 71590, 38267, 95014, 62748, 14083, 79356,
];

let currentProblemIdx = 0;

function seededRandom(seed) {
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0x100000000;
  };
}

function generateDeck(suitCount) {
  // suitCount: 1〜4。常に104枚になるよう調整
  // 例: 1スート → ♠のみ × 8周 = 104枚
  //     2スート → ♠♥ × 4周 = 104枚
  //     4スート → ♠♥♦♣ × 2周 = 104枚
  const n = suitCount || currentDifficulty;
  const usedSuits = SUITS.slice(0, n);
  const totalCards = 104;
  const repeats = totalCards / (n * 13); // 何周するか
  const deck = [];
  for (let rep = 0; rep < repeats; rep++)
    for (let s = 0; s < n; s++)
      for (let r = 0; r < 13; r++)
        deck.push({ rank: RANKS[r], suit: usedSuits[s], faceUp: false });
  return deck;
}

function shuffleDeck(deck, rng) {
  const d = [...deck];
  for (let i = d.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [d[i], d[j]] = [d[j], d[i]];
  }
  return d;
}

function dealGame(seed) {
  const rng = seededRandom(seed);
  // 難易度に応じたデッキ（常に104枚）
  const deck = generateDeck();
  const shuffled = shuffleDeck(deck, rng);

  const columns = Array.from({ length: 10 }, () => []);
  // deal 54 cards: first 4 cols get 6, rest get 5
  let idx = 0;
  for (let c = 0; c < 10; c++) {
    const count = c < 4 ? 6 : 5;
    for (let i = 0; i < count; i++) {
      columns[c].push({ ...shuffled[idx++], faceUp: false });
    }
    // top card face up
    columns[c][columns[c].length - 1].faceUp = true;
  }

  // remaining 50 cards → 5 stock piles of 10
  const stock = [];
  for (let i = 0; i < 5; i++) {
    stock.push(shuffled.slice(idx + i * 10, idx + i * 10 + 10));
  }

  return { columns, stock };
}

function renderFoundations() {

    const slot = document.createElement('div');
    slot.className = 'foundation-slot' + (i < state.foundations.length ? ' filled' : '');
    if (i < state.foundations.length) {
      const f = state.foundations[i];

    } else {
      slot.textContent = '♤';
    }
    el.appendChild(slot);
  }
}

function renderColumns() {
  const el = document.getElementById('columns');

  // --- dynamic card offsets ---
  const CARD_H = 100;
  const DEFAULT_FD = 14;
  const FACE_UP_OFFSET = 30;
  const MIN_FD = 5;
  const MIN_FU = 22;  // 表向き最小オフセット（ランク＋スートが見える下限）
  const availH = el.clientHeight || Math.floor(window.innerHeight * 0.55);

  // 列のカード総数に応じた裏向きオフセット（段階的圧縮）
  function thresholdFd(total) {
    if (total <= 10) return DEFAULT_FD;                    // 通常 (14px)
    if (total <= 15) return Math.round(DEFAULT_FD * 0.6); // 60% (8px)
    return Math.round(DEFAULT_FD * 0.4);                  // 40% (6px)
  }

  // Step1: 裏向きオフセットのグローバルスケール
  let fdScale = 1.0;
  if (availH > CARD_H) {
    state.columns.forEach(col => {
      const nfd = col.filter(c => !c.faceUp).length;
      const nfu = col.filter(c =>  c.faceUp).length;
      if (nfd === 0) return;
      const fd = thresholdFd(col.length);
      const availForFd = availH - CARD_H - nfu * FACE_UP_OFFSET;
      if (availForFd > 0 && nfd * fd > availForFd) {
        fdScale = Math.min(fdScale, availForFd / (nfd * fd));
      }
    });
  }

  // Step2: 裏向き圧縮後もはみ出す列は表向きも圧縮（MIN_FUを下限に）
  function getFuOffset(col) {
    const nfu = col.filter(c => c.faceUp).length;
    if (nfu <= 1) return FACE_UP_OFFSET;
    const nfd = col.filter(c => !c.faceUp).length;
    const FD = Math.max(MIN_FD, Math.round(thresholdFd(col.length) * fdScale));
    const remainForFu = availH - CARD_H - nfd * FD;
    if (remainForFu >= nfu * FACE_UP_OFFSET) return FACE_UP_OFFSET;
    return Math.max(MIN_FU, Math.floor(remainForFu / nfu));
  }
  // --- end dynamic offset ---

  el.innerHTML = '';

  state.columns.forEach((col, ci) => {
    const FD = Math.max(MIN_FD, Math.round(thresholdFd(col.length) * fdScale));
    const FU = getFuOffset(col);

    const colEl = document.createElement('div');
    colEl.className = 'column';
    colEl.dataset.colIdx = ci;

    const label = document.createElement('span');
    label.className = 'col-label';
    label.textContent = ci + 1;
    colEl.appendChild(label);

    const slot = document.createElement('div');
    slot.className = 'column-slot';
    colEl.appendChild(slot);

    let top = 0;
    col.forEach((card, ki) => {
      const isFront = (ki === col.length - 1);  // 最前面カード
      const cardEl = document.createElement('div');
      cardEl.className = 'card'
        + (!card.faceUp ? ' face-down' : '')
        + (card.dealing   ? ' dealing'   : '')
        + (isFront && card.faceUp ? ' card-front' : '');
      cardEl.style.top = top + 'px';
      cardEl.style.zIndex = ki + 1;
      cardEl.dataset.col = ci;
      cardEl.dataset.ki = ki;
      cardEl.draggable = false;

      if (card.faceUp) {
        const isR = isRed(card.suit);
        const cls = isR ? 'red' : 'black';
        cardEl.innerHTML = `
          <div class="card-top">
            <span class="card-top-rank ${cls}${card.rank === '10' ? ' rank-10' : ''}">${card.rank}</span>
            <span class="card-top-suit ${cls}">${card.suit}</span>
          </div>
          <span class="card-center-suit ${cls}">${card.suit}</span>
        `;

        const selKey = `${ci}-${ki}`;
        // ヒント表示
        if (hintCards.includes(selKey)) {
          cardEl.classList.add('hint-card');
        }

        cardEl.addEventListener('pointerdown', e => onPointerDown(e, ci, ki));
      }

      top += card.faceUp ? FU : FD;
      colEl.appendChild(cardEl);
    });

    // total height
    const totalH = top + CARD_H;
    colEl.style.height = totalH + 'px';

    el.appendChild(colEl);
  });
}

function renderStock() {
  const el = document.getElementById('stock-area');

// ============================================================
// CARD INTERACTIONS
// ============================================================
// ============================================================
// タップ / ドラッグ 共通エントリ
// ============================================================
function onPointerDown(e, ci, ki) {
  if (isDealing || dragState) return;
  e.preventDefault();

  const col = state.columns[ci];
  if (!col[ki] || !col[ki].faceUp) return;

  const rect = e.currentTarget.getBoundingClientRect();
  const cardEl = e.currentTarget;

  dragState = {
    fromCol: ci, fromKi: ki,
    startX: e.clientX, startY: e.clientY,
    offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
    originalLeft: rect.left, originalTop: rect.top,
    currentX: e.clientX, currentY: e.clientY,
    isDragging: false, longPressed: false,
    ghostEl: null, hiddenEls: [], targets: [],
    cardWidth: rect.width, cardEl,
    // 長押しタイマー
    longPressTimer: setTimeout(() => startDragFromLongPress(), 250),
  };

  document.addEventListener('pointermove', onDragMove, { passive: false });
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragCancel);
}

function startDragFromLongPress() {
  if (!dragState || dragState.isDragging) return;

  const col = state.columns[dragState.fromCol];
  if (!isValidSequence(col, dragState.fromKi)) return;

  dragState.longPressed = true;
  dragState.isDragging = true;
  dragState.targets = findValidTargets(dragState.fromCol, dragState.fromKi);

  // ゴースト生成
  const ghost = buildGhostEl(dragState.fromCol, dragState.fromKi, dragState.cardWidth);
  const tx = dragState.currentX - dragState.offsetX;
  const ty = dragState.currentY - dragState.offsetY;
  ghost.style.transform = `translate(${tx}px,${ty}px)`;
  document.body.appendChild(ghost);
  dragState.ghostEl = ghost;

  // ドラッグ元カードを非表示
  for (let k = dragState.fromKi; k < state.columns[dragState.fromCol].length; k++) {
    const el = document.querySelector(`[data-col="${dragState.fromCol}"][data-ki="${k}"]`);
    if (el) { el.style.opacity = '0'; dragState.hiddenEls.push(el); }
  }

  // 有効列をハイライト（空き列はスロット、有カード列はトップカードを光らせる）
  dragState.targets.forEach(ti => {
    const tcol = state.columns[ti];
    if (tcol.length === 0) {
      const colEl = document.querySelector(`[data-col-idx="${ti}"]`);
      if (colEl) colEl.classList.add('drag-target');
    } else {
      const topKi = tcol.length - 1;
      const cardEl = document.querySelector(`[data-col="${ti}"][data-ki="${topKi}"]`);
      if (cardEl) cardEl.classList.add('valid-target');
    }
  });
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  dragState.currentX = e.clientX;
  dragState.currentY = e.clientY;

  // 指が動いたら長押しタイマーをキャンセル（スクロール意図）
  if (!dragState.isDragging) {
    const dx = e.clientX - dragState.startX;
    const dy = e.clientY - dragState.startY;
    if (dx * dx + dy * dy > DRAG_THRESHOLD * DRAG_THRESHOLD) {
      clearTimeout(dragState.longPressTimer);
      // 長押し前に動いた → タップ扱いでキャンセル
      removeDragListeners();
      const { fromCol, fromKi } = dragState;
      dragState = null;
      handleTap(fromCol, fromKi);
    }
    return;
  }

  const tx = e.clientX - dragState.offsetX;
  const ty = e.clientY - dragState.offsetY;
  dragState.ghostEl.style.transform = `translate(${tx}px,${ty}px)`;
}

function onDragEnd(e) {
  if (!dragState) return;
  clearTimeout(dragState.longPressTimer);
  removeDragListeners();
  clearDragHighlights();

  if (!dragState.isDragging) {
    // 長押し前にリリース → タップとして処理
    const { fromCol, fromKi } = dragState;
    dragState = null;
    handleTap(fromCol, fromKi);
    return;
  }

  const { ghostEl, hiddenEls, targets, fromCol, fromKi, currentX, currentY, originalLeft, originalTop } = dragState;
  dragState = null;

  const targetCol = getDropCol(currentX, currentY, ghostEl);
  if (targetCol !== -1 && targets.includes(targetCol)) {
    ghostEl.remove();
    hiddenEls.forEach(el => el.style.opacity = '');
    selected = { colIdx: fromCol, cardIdx: fromKi };
    validTargets = [];
    moveSelected(targetCol);
  } else {
    // 元の位置にスナップバック
    hiddenEls.forEach(el => el.style.opacity = '');
    ghostEl.style.transition = 'transform 0.22s cubic-bezier(0.2,0,0.3,1)';
    ghostEl.style.transform = `translate(${originalLeft}px,${originalTop}px)`;
    setTimeout(() => ghostEl.remove(), 230);
  }
}

function onDragCancel() {
  if (!dragState) return;
  clearTimeout(dragState.longPressTimer);
  removeDragListeners();
  clearDragHighlights();
  const { ghostEl, hiddenEls, originalLeft, originalTop } = dragState;
  dragState = null;
  hiddenEls.forEach(el => el.style.opacity = '');
  if (ghostEl) {
    ghostEl.style.transition = 'transform 0.22s ease-out';
    ghostEl.style.transform = `translate(${originalLeft}px,${originalTop}px)`;
    setTimeout(() => ghostEl.remove(), 230);
  }
}

function removeDragListeners() {
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragCancel);
}

function clearDragHighlights() {
  document.querySelectorAll('.column.drag-target').forEach(el => el.classList.remove('drag-target'));
  document.querySelectorAll('.card.valid-target').forEach(el => el.classList.remove('valid-target'));
}

function buildGhostEl(fromCol, fromKi, cardWidth) {
  const ghost = document.createElement('div');
  ghost.id = 'drag-ghost';
  ghost.style.cssText = `position:fixed;left:0;top:0;width:${cardWidth}px;pointer-events:none;z-index:9999;will-change:transform;`;

  const FACE_UP_OFFSET = 30, CARD_H = 100;
  const cards = state.columns[fromCol].slice(fromKi);
  let top = 0;
  cards.forEach((card, i) => {
    const el = document.createElement('div');
    const isR = isRed(card.suit);
    const cls = isR ? 'red' : 'black';
    el.className = 'card card-front';
    el.style.cssText = `position:absolute;top:${top}px;width:100%;height:${CARD_H}px;`;
    el.innerHTML = `
      <div class="card-top">
        <span class="card-top-rank ${cls}${card.rank === '10' ? ' rank-10' : ''}">${card.rank}</span>
        <span class="card-top-suit ${cls}">${card.suit}</span>
      </div>
      <span class="card-center-suit ${cls}">${card.suit}</span>`;
    ghost.appendChild(el);
    if (i < cards.length - 1) top += FACE_UP_OFFSET;
  });
  ghost.style.height = (top + CARD_H) + 'px';
  ghost.style.filter = 'drop-shadow(0 8px 20px rgba(0,0,0,0.6))';
  return ghost;
}

function getDropCol(x, y, ghostEl) {
  if (ghostEl) ghostEl.style.display = 'none';
  const el = document.elementFromPoint(x, y);
  if (ghostEl) ghostEl.style.display = '';
  if (!el) return -1;
  const colEl = el.closest('[data-col-idx]');
  return colEl ? parseInt(colEl.dataset.colIdx) : -1;
}

// ============================================================
// タップ処理（pointerdown → pointerup で移動なし）
// ============================================================
function handleTap(ci, ki) {
  clearHints();
  const col = state.columns[ci];
  if (!col[ki] || !col[ki].faceUp) return;

  if (!isValidSequence(col, ki)) {
    showToast(t('toast.cantMove'));
    return;
  }

  const targets = findValidTargets(ci, ki);
  if (targets.length === 0) {
    showToast(t('toast.noTarget'));
    return;
  }

  // 左優先（同スーツ→異スーツ→空き列）で自動移動
  selected = { colIdx: ci, cardIdx: ki };
  validTargets = [];
  moveSelected(targets[0], true); // アニメあり
}

function findValidTargets(fromCol, fromKi) {
  const movingCard = state.columns[fromCol][fromKi];
  const movingRank = RANK_VAL[movingCard.rank];
  const sameSuit = [], diffSuit = [], empty = [];

  for (let i = 0; i < state.columns.length; i++) {
    if (i === fromCol) continue;
    const tcol = state.columns[i];
    if (tcol.length === 0) {
      empty.push(i);
    } else {
      const top = tcol[tcol.length - 1];
      if (top.faceUp && RANK_VAL[top.rank] === movingRank + 1) {
        if (top.suit === movingCard.suit) sameSuit.push(i);
        else diffSuit.push(i);
      }
    }
  }

  // 優先順: 同スーツ → 異スーツ → 空き列（各カテゴリ内は左優先）
  return [...sameSuit, ...diffSuit, ...empty];
}

function isValidSequence(col, startKi) {
  for (let i = startKi; i < col.length - 1; i++) {
    const cur = col[i], next = col[i + 1];
    if (!cur.faceUp || !next.faceUp) return false;
    if (RANK_VAL[cur.rank] !== RANK_VAL[next.rank] + 1) return false;
    if (cur.suit !== next.suit) return false;
  }
  return true;
}

// ============================================================
// ① オート完成
// ============================================================
function checkAutoFinish() {
  if (state.gameOver || isAutoCompleting) return;
  if (state.stock.length > 0) return;
  // 裏向きカードが残っていたら不可
  if (state.columns.some(col => col.some(c => !c.faceUp))) return;
  // まだ完成していないセットがある場合のみ
  if (state.foundations.length >= 8) return;

  isAutoCompleting = true;
  showToast(t('toast.autoComplete'));
  setTimeout(runAutoStep, 400);
}

function runAutoStep() {
  if (state.gameOver) { isAutoCompleting = false; return; }
  const move = findAutoMove();
  if (!move) { isAutoCompleting = false; return; }
  selected = { colIdx: move.fromCol, cardIdx: move.fromKi };
  validTargets = [];
  moveSelected(move.toCol, true);
}

function findAutoMove() {
  // 同スーツ接続を優先して探す
  for (let ci = 0; ci < state.columns.length; ci++) {
    const col = state.columns[ci];
    for (let ki = 0; ki < col.length; ki++) {
      if (!col[ki].faceUp || !isValidSequence(col, ki)) continue;
      const same = findValidTargets(ci, ki).filter(ti => {
        const tc = state.columns[ti];
        return tc.length > 0 && tc[tc.length - 1].suit === col[ki].suit;
      });
      if (same.length > 0) return { fromCol: ci, fromKi: ki, toCol: same[0] };
    }
  }
  // 任意の有効手
  for (let ci = 0; ci < state.columns.length; ci++) {
    const col = state.columns[ci];
    for (let ki = 0; ki < col.length; ki++) {
      if (!col[ki].faceUp || !isValidSequence(col, ki)) continue;
      const targets = findValidTargets(ci, ki);
      if (targets.length > 0) return { fromCol: ci, fromKi: ki, toCol: targets[0] };
    }
  }
  return null;
}

// ============================================================
// ② 詰まり検出
// ============================================================
function isDeadEnd() {
  if (state.gameOver || isAutoCompleting) return false;
  // 山札が補充できる？（全列に1枚以上ある場合）
  if (state.stock.length > 0 && state.columns.every(c => c.length > 0)) return false;
  // 有効な手がある？
  for (let ci = 0; ci < state.columns.length; ci++) {
    const col = state.columns[ci];
    for (let ki = 0; ki < col.length; ki++) {
      if (!col[ki].faceUp || !isValidSequence(col, ki)) continue;
      if (findValidTargets(ci, ki).length > 0) return false;
    }
  }
  return true;
}

function checkDeadEnd() {
  if (!isDeadEnd()) return;
  showModal(`
    <h2>${t('modal.dead.title')}</h2>
    <p style="margin-bottom:20px">${t('modal.dead.body')}</p>
    <div class="btn-group">
      <button class="btn primary" onclick="undoMove();hideModal()">${t('modal.dead.undo')}</button>
      <button class="btn" onclick="hideModal()">${t('modal.dead.continue')}</button>
    </div>
  `);
}

function moveSelected(toCol, animate = false) {
  if (!selected) return;
  const { colIdx: fromCol, cardIdx: fromKi } = selected;
  const toColArr = state.columns[toCol];
  const movingCards = state.columns[fromCol].slice(fromKi);
  const topOfTarget = toColArr[toColArr.length - 1];

  // validate
  const movingRank = RANK_VAL[movingCards[0].rank];
  if (topOfTarget && RANK_VAL[topOfTarget.rank] !== movingRank + 1) {
    showToast(t('toast.cantPlace'));
    selected = null;
    render();
    return;
  }

  // アニメ用: 移動前のカード位置を取得
  const srcRects = [];
  if (animate) {
    for (let k = fromKi; k < fromKi + movingCards.length; k++) {
      const el = document.querySelector(`[data-col="${fromCol}"][data-ki="${k}"]`);
      srcRects.push(el ? el.getBoundingClientRect() : null);
    }
  }

  // 振り返り用：移動の説明文（移動前に生成）
  const _reviewMoveDesc = currentLang === 'en'
    ? `Col${fromCol + 1}→Col${toCol + 1}: ${movingCards[0].rank}${movingCards[0].suit}`
    : `列${fromCol + 1}→列${toCol + 1}: ${movingCards[0].rank}${movingCards[0].suit}`;

  // save history
  saveHistory('move', {
    fromCol, fromKi, toCol,
    toColLen: toColArr.length,
    movedCards: movingCards.map(c => ({ ...c })),
    prevTopFaceUp: fromKi > 0 ? state.columns[fromCol][fromKi - 1].faceUp : null,
  });

  // execute move
  state.columns[fromCol].splice(fromKi);
  state.columns[toCol].push(...movingCards);
  clearCoachHighlight();

  // flip new top of source
  const srcCol = state.columns[fromCol];
  if (srcCol.length > 0 && !srcCol[srcCol.length - 1].faceUp) {
    srcCol[srcCol.length - 1].faceUp = true;
  }

  state.moves++;
  state.score = Math.max(0, state.score - 1);
  selected = null;
  validTargets = [];

  // 振り返り用：差分保存
  pushGameHistory(makeGameHistoryEntry('move', _reviewMoveDesc, {
    [fromCol]: state.columns[fromCol].map(c => ({...c})),
    [toCol]:   state.columns[toCol].map(c => ({...c})),
  }));

  const afterMove = () => {
    checkCompletedSet(toCol);
    updateStats();
    render();
    if (!isAutoCompleting) checkDeadEnd();
    checkAutoFinish();
  };

  if (animate && srcRects.some(r => r !== null)) {
    render(); // まずDOMを更新
    // 移動先カードの位置を取得
    const newLen = state.columns[toCol].length;
    const dstRects = [], dstEls = [];
    for (let k = newLen - movingCards.length; k < newLen; k++) {
      const el = document.querySelector(`[data-col="${toCol}"][data-ki="${k}"]`);
      dstRects.push(el ? el.getBoundingClientRect() : null);
      dstEls.push(el);
    }
    // 移動先を一時的に非表示
    dstEls.forEach(el => { if (el) el.style.visibility = 'hidden'; });
    // クローンを作成してアニメ
    const clones = [];
    movingCards.forEach((card, i) => {
      const src = srcRects[i], dst = dstRects[i];
      if (!src || !dst) return;
      const isR = isRed(card.suit);
      const cls = isR ? 'red' : 'black';
      const cl = document.createElement('div');
      cl.className = 'card card-front';
      cl.style.cssText = `position:fixed;left:0;top:0;width:${src.width}px;height:${src.height}px;transform:translate(${src.left}px,${src.top}px);pointer-events:none;z-index:999;will-change:transform;`;
      cl.innerHTML = `<div class="card-top"><span class="card-top-rank ${cls}${card.rank==='10'?' rank-10':''}">${card.rank}</span><span class="card-top-suit ${cls}">${card.suit}</span></div><span class="card-center-suit ${cls}">${card.suit}</span>`;
      document.body.appendChild(cl);
      clones.push({ cl, dst });
    });
    isDealing = true;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      clones.forEach(({ cl, dst }) => {
        cl.style.transition = 'transform 0.18s cubic-bezier(0.2,0,0.3,1)';
        cl.style.transform = `translate(${dst.left}px,${dst.top}px)`;
      });
    }));
    setTimeout(() => {
      clones.forEach(({ cl }) => cl.remove());
      dstEls.forEach(el => { if (el) el.style.visibility = ''; });
      isDealing = false;
      afterMove();
    }, 200);
  } else {
    afterMove();
  }
}

function checkCompletedSet(colIdx) {
  const col = state.columns[colIdx];
  if (col.length < 13) return false;

  const start = col.length - 13;
  const seq = col.slice(start);

  // K(index12)→Q(11)→...→A(0) 同スーツ・全て表向き
  if (seq[0].rank !== 'K') return false;
  const suit = seq[0].suit;
  for (let i = 0; i < 13; i++) {
    if (!seq[i].faceUp) return false;
    if (seq[i].suit !== suit) return false;
    if (seq[i].rank !== RANKS[12 - i]) return false;
  }

  // historyに保存（undo対応）
  saveHistory('complete', {
    colIdx,
    start,
    cards: seq.map(c => ({...c})),
    prevTopFaceUp: start > 0 ? state.columns[colIdx][start - 1].faceUp : null,
  });

  animateSetComplete(colIdx, start, seq, suit);
  return true;
}

function animateSetComplete(colIdx, start, seq, suit) {
  const colEl = document.querySelectorAll('.column')[colIdx];
  const foundationEl = document.querySelector('.top-row');
  if (!colEl || !foundationEl) {
    applySetComplete(colIdx, start, suit);
    return;
  }

  const fRect = foundationEl.getBoundingClientRect();
  const destX = fRect.left + fRect.width / 2;
  const destY = fRect.top + 40;

  // render()前に全カードの位置を記録
  const cardEls = colEl.querySelectorAll('.card');
  const rects = [];
  for (let i = 0; i < 13; i++) {
    const el = cardEls[start + i];
    rects.push(el ? el.getBoundingClientRect() : null);
  }

  // 元のカードを即座に非表示（瞬間移動して見えないよう）
  for (let i = 0; i < 13; i++) {
    const el = cardEls[start + i];
    if (el) el.style.visibility = 'hidden';
  }

  // A(seqIdx=12)→2(11)→...→K(0) の順に飛ばす
  const ORDER = [...Array(13)].map((_, i) => 12 - i);
  const totalDuration = ORDER.length * 55 + 450;

  ORDER.forEach((seqIdx, flyStep) => {
    const rect = rects[seqIdx];
    if (!rect) return;

    setTimeout(() => {
      const card = seq[seqIdx];
      const isRed = card.suit === '♥' || card.suit === '♦';

      const flying = document.createElement('div');
      flying.style.cssText = `
        position:fixed;
        left:${rect.left}px; top:${rect.top}px;
        width:${rect.width}px; height:${rect.height}px;
        background:#fff; border-radius:7px;
        border:1px solid #bbb;
        box-shadow:0 2px 8px rgba(0,0,0,0.3);
        z-index:999; pointer-events:none;
        display:flex; align-items:flex-start; padding:4px 5px;
        font-family:'DM Mono',monospace; font-weight:800; font-size:1rem;
        color:${isRed ? '#c0392b' : '#1a1a1a'};
        transition: transform 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.4s;
      `;
      flying.textContent = card.rank + card.suit;
      document.body.appendChild(flying);

      const dx = destX - (rect.left + rect.width / 2);
      const dy = destY - (rect.top + rect.height / 2);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          flying.style.transform = `translate(${dx}px,${dy}px) scale(0.55)`;
          flying.style.opacity = '0';
        });
      });

      setTimeout(() => flying.remove(), 450);
    }, flyStep * 55);
  });

  // 全カードが飛び終わったら盤面を更新
  setTimeout(() => applySetComplete(colIdx, start, suit), totalDuration);
}

function applySetComplete(colIdx, start, suit) {
  state.columns[colIdx].splice(start, 13);
  state.foundations.push({ suit });
  state.cleared++;
  state.score += 100;
  // 振り返り用：スート完成の差分保存
  const _completeDesc = currentLang === 'en' ? `${suit} suit complete` : `${suit}スート完成`;
  pushGameHistory(makeGameHistoryEntry('complete', _completeDesc,
    { [colIdx]: state.columns[colIdx].map(c => ({...c})) }));

  const c = state.columns[colIdx];
  if (c.length > 0 && !c[c.length - 1].faceUp) c[c.length - 1].faceUp = true;

  showToast(t('toast.suitComplete', suit));
  updateStats();
  render();

  if (state.foundations.length === 8) {
    setTimeout(showWin, 500);
  }
}

function dealFromStock() {
  if (isDealing) return;
  if (state.stock.length === 0) return;

  const allHaveCards = state.columns.every(c => c.length > 0);
  if (!allHaveCards) {
    showToast(t('toast.noStock'));
    return;
  }

  saveHistory('deal', {
    stockIdx: state.stock.length - 1,
    cards: state.stock[state.stock.length - 1].map(c => ({ ...c })),
  });

  const batch = state.stock.pop();

  // 山札の位置を取得（アニメ起点）
  const stockEl = document.querySelector('.stock-pile');
  if (!stockEl) {
    batch.forEach((card, i) => state.columns[i].push({ ...card, faceUp: true }));
    state.moves++;
    state.score = Math.max(0, state.score - 1);
    const _dealDesc1 = currentLang === 'en'
      ? `Deal from stock (${state.stock.length} remaining)`
      : `山札を配る（残り${state.stock.length}回）`;
    pushGameHistory(makeGameHistoryEntry('deal', _dealDesc1,
      Object.fromEntries(state.columns.map((col, i) => [i, col.map(c => ({...c}))]))));
    updateStats();
    render();
    return;
  }
  const stockRect = stockEl.getBoundingClientRect();
  const srcX = stockRect.left + stockRect.width / 2;
  const srcY = stockRect.top + stockRect.height / 2;

  // 状態を更新してrender()を1回だけ呼ぶ
  batch.forEach((card, i) => state.columns[i].push({ ...card, faceUp: true }));
  state.moves++;
  state.score = Math.max(0, state.score - 1);
  const _dealDesc2 = currentLang === 'en'
    ? `Deal from stock (${state.stock.length} remaining)`
    : `山札を配る（残り${state.stock.length}回）`;
  pushGameHistory(makeGameHistoryEntry('deal', _dealDesc2,
    Object.fromEntries(state.columns.map((col, i) => [i, col.map(c => ({...c}))]))));
  updateStats();
  render();

  // render()後に各列の最上段カードの位置を記録 → 隠す
  const colEls = document.querySelectorAll('.column');
  const destRects = [];
  const newCardEls = [];
  for (let i = 0; i < 10; i++) {
    const cards = colEls[i] ? colEls[i].querySelectorAll('.card') : [];
    const el = cards[cards.length - 1] || null;
    destRects.push(el ? el.getBoundingClientRect() : null);
    newCardEls.push(el);
    if (el) el.style.visibility = 'hidden';
  }

  // アニメーションロック
  isDealing = true;

  const INTERVAL = 50;
  const FLY_MS   = 370;

  batch.forEach((card, i) => {
    const dest = destRects[i];
    if (!dest) return;

    setTimeout(() => {
      const red = card.suit === '♥' || card.suit === '♦';

      const flying = document.createElement('div');
      flying.style.cssText = `
        position:fixed;
        left:${srcX - dest.width / 2}px;
        top:${srcY - dest.height / 2}px;
        width:${dest.width}px; height:${dest.height}px;
        background:#fff; border-radius:7px;
        border:1px solid #bbb;
        box-shadow:0 4px 14px rgba(0,0,0,0.45);
        z-index:999; pointer-events:none;
        display:flex; align-items:flex-start; padding:4px 5px;
        font-family:'DM Mono',monospace; font-weight:800; font-size:1rem;
        color:${red ? '#c0392b' : '#1a1a1a'};
        transition:transform ${FLY_MS}ms cubic-bezier(0.25,0.46,0.45,0.94),
                   opacity 0.15s ease ${FLY_MS - 60}ms;
        will-change:transform;
      `;
      flying.textContent = card.rank + card.suit;
      document.body.appendChild(flying);

      const dx = dest.left - (srcX - dest.width / 2);
      const dy = dest.top  - (srcY - dest.height / 2);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        flying.style.transform = `translate(${dx}px,${dy}px)`;
      }));

      setTimeout(() => {
        flying.remove();
        if (newCardEls[i]) newCardEls[i].style.visibility = '';
      }, FLY_MS);

    }, i * INTERVAL);
  });

  // 全カード着地後にロック解除
  setTimeout(() => {
    isDealing = false;
    renderStock();
    checkDeadEnd();
  }, 10 * INTERVAL + FLY_MS + 30);
}

// ============================================================
// UNDO
// ============================================================
function saveHistory(type, data) {
  state.history.push({ type, data, moves: state.moves, score: state.score });
}

function undoMove() {
  if (state.history.length === 0) {
    showToast(t('toast.noUndo'));
    return;
  }

  const entry = state.history.pop();
  state.moves = entry.moves;
  state.score = entry.score;
  selected = null;
  validTargets = [];
  clearHints();

  if (entry.type === 'move') {
    const { fromCol, fromKi, toCol, toColLen, movedCards, prevTopFaceUp } = entry.data;
    // remove from destination
    state.columns[toCol].splice(toColLen);
    // restore to source
    state.columns[fromCol].splice(fromKi);
    state.columns[fromCol].push(...movedCards);
    // restore face-up state of card before moved cards
    if (fromKi > 0 && prevTopFaceUp !== null) {
      state.columns[fromCol][fromKi - 1].faceUp = prevTopFaceUp;
    }
  } else if (entry.type === 'deal') {
    const { stockIdx, cards } = entry.data;
    // remove last card from each column
    state.columns.forEach((col) => col.pop());
    state.stock.push(cards);
  } else if (entry.type === 'complete') {
    const { colIdx, start, cards, prevTopFaceUp } = entry.data;
    // foundationsから取り除く
    state.foundations.pop();
    state.cleared--;
    // カードを列に戻す
    state.columns[colIdx].splice(start, 0, ...cards);
    // その下のカードの表裏を戻す
    if (start > 0 && prevTopFaceUp !== null) {
      state.columns[colIdx][start - 1].faceUp = prevTopFaceUp;
    }
  }

  updateStats();
  render();
  // 振り返り用：undo分の履歴を削除（手0は保持）
  if (gameHistory.length > 1) gameHistory.pop();
}

// ============================================================
// HINT
// ============================================================
function showHint() {
  clearHints();
  const moves = findAllMoves();

  if (moves.length === 0) {
    showToast(t('toast.noMoves'));
    return;
  }

  const best = pickBestMove(moves);
  const fromKey = `${best.fromCol}-${best.fromKi}`;

  hintCards = [fromKey];
  state.hintUsed++;
  state.score = Math.max(0, state.score - 50); // ヒント使用で大幅減点
  updateStats();
  render();

  setTimeout(clearHints, 3000);
  showToast(t('toast.hintUsed'));
}

// AIバーの「ヒント」ボタン用 — 移動可能なカードをすべてハイライト（減点なし）
function showAllHints() {
  clearHints();
  clearCoachHighlight();
  const moves = findAllMoves();
  if (moves.length === 0) {
    showToast(t('toast.noMoves'));
    return;
  }
  // 各移動の起点カード（fromCol-fromKi）をすべて収集（重複除去）
  hintCards = [...new Set(moves.map(m => `${m.fromCol}-${m.fromKi}`))];
  render();
  setTimeout(() => { clearHints(); render(); }, 4000);
}

/**
 * 局面を評価してベストな手を返す
 * 優先度（高い順）：
 * 1. 完成セット（K→A同スーツ）が完成する手
 * 2. 空列を作れる手（最優先 — 空列は整理の要）
 * 3. 空列を使って裏向きをめくれる手（空列活用）
 * 4. 裏向きカードをめくれる手
 * 5. 同スーツで連結しつつ裏向きをめくれる手
 * 6. 同スーツ接続
 * 7. それ以外
 */
function pickBestMove(moves) {
  let best = null;
  let bestScore = -Infinity;

  // 現在の空列数
  const currentEmpties = state.columns.filter(c => c.length === 0).length;

  moves.forEach(m => {
    let score = 0;
    const movingCards = state.columns[m.fromCol].slice(m.fromKi);
    const movingTopCard = movingCards[0];
    const targetCol = state.columns[m.toCol];
    const targetTop = targetCol[targetCol.length - 1];
    const srcColAfter = state.columns[m.fromCol].slice(0, m.fromKi);

    // 1. この手でK→A同スーツが完成するか
    if (targetTop) {
      const combined = [...targetCol, ...movingCards];
      const start = combined.length - 13;
      if (start >= 0 && combined[start] && combined[start].rank === 'K') {
        let complete = true;
        for (let i = 0; i < 13; i++) {
          if (!combined[start + i] || combined[start + i].rank !== RANKS[12 - i] || combined[start + i].suit !== combined[start].suit) {
            complete = false; break;
          }
        }
        if (complete) score += 10000;
      }
    }

    // 2. 空列を作れる（最最優先）
    const makesEmpty = srcColAfter.length === 0;
    if (makesEmpty) score += 2000;

    // 3. 空列への移動で裏向きをめくれる（空列活用）
    const movingToEmpty = !targetTop;
    const flipsAfterMove = srcColAfter.length > 0 && !srcColAfter[srcColAfter.length - 1].faceUp;
    if (movingToEmpty && flipsAfterMove) score += 800;

    // 4. 裏向きカードをめくれる（空列不要でも）
    if (!movingToEmpty && flipsAfterMove) score += 600;

    // 5. 同スーツ接続ボーナス
    if (targetTop && targetTop.suit === movingTopCard.suit) {
      score += 200;
      // 同スーツ連鎖が長くなるほど加点
      let chainLen = movingCards.length;
      for (let i = targetCol.length - 1; i >= 0; i--) {
        if (targetCol[i].suit === movingTopCard.suit && targetCol[i].faceUp) chainLen++;
        else break;
      }
      score += chainLen * 15;
    }

    // 6. 移動枚数ボーナス（多く動かすほど整理が進む）
    score += movingCards.length * 8;

    // ── ペナルティ ────────────────────────────────────────

    // P1. 同スーツ連鎖を崩す（大きなペナルティ）
    if (m.fromKi > 0) {
      const cardBelow = state.columns[m.fromCol][m.fromKi - 1];
      if (cardBelow && cardBelow.faceUp && cardBelow.suit === movingTopCard.suit) score -= 500;
    }

    // P2. 空列への無駄移動（裏向きもめくれず、空列も増えず）
    if (movingToEmpty && !flipsAfterMove && !makesEmpty) {
      score -= 300;
    }

    // P3. 異スーツ接続で何の進展もない手
    if (targetTop && targetTop.suit !== movingTopCard.suit && !flipsAfterMove && !makesEmpty) {
      score -= 200;
    }

    if (score > bestScore) {
      bestScore = score;
      best = m;
    }
  });

  // スコアが低すぎる（完全に無価値）場合はnull
  if (bestScore < 0) return null;

  return best;
}

function findAllMoves() {
  const moves = [];
  state.columns.forEach((col, ci) => {
    for (let ki = 0; ki < col.length; ki++) {
      if (!col[ki].faceUp) continue;
      if (!isValidSequence(col, ki)) continue;
      const movingRank = RANK_VAL[col[ki].rank];

      state.columns.forEach((tcol, ti) => {
        if (ti === ci) return;
        const topCard = tcol[tcol.length - 1];
        if (!topCard && ki === 0) { // moving whole column to empty - skip trivial
          // only suggest if it frees a face-down card
          if (col.some(c => !c.faceUp)) {
            moves.push({ fromCol: ci, fromKi: ki, toCol: ti, toColLen: 0 });
          }
        } else if (topCard && topCard.faceUp && RANK_VAL[topCard.rank] === movingRank + 1) {
          moves.push({ fromCol: ci, fromKi: ki, toCol: ti, toColLen: tcol.length });
        }
      });
    }
  });
  return moves;
}
