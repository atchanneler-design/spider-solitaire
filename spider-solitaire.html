function detectTurningPoints() {
  const tps = [];
  for (let i = 1; i < gameHistory.length; i++) {
    const prev = gameHistory[i - 1].metrics;
    const curr = gameHistory[i].metrics;
    if (curr.emptyColumns > prev.emptyColumns) {
      tps.push({ moveNumber: gameHistory[i].moveNumber, type: 'good', icon: '✅',
        reason: currentLang === 'en' ? 'Empty col' : '空き列確保' });
    }
    if (curr.emptyColumns === 0 && prev.emptyColumns > 0) {
      tps.push({ moveNumber: gameHistory[i].moveNumber, type: 'bad', icon: '⚠️',
        reason: currentLang === 'en' ? 'No empty col' : '空き列消滅' });
    }
    if (prev.hiddenCards - curr.hiddenCards >= 3) {
      tps.push({ moveNumber: gameHistory[i].moveNumber, type: 'key', icon: '⭐',
        reason: currentLang === 'en'
          ? `Flip ${prev.hiddenCards - curr.hiddenCards}`
          : `裏${prev.hiddenCards - curr.hiddenCards}枚めくり` });
    }
    if (gameHistory[i].type === 'complete') {
      tps.push({ moveNumber: gameHistory[i].moveNumber, type: 'good', icon: '🎉',
        reason: currentLang === 'en' ? 'Suit done' : 'スート完成' });
    }
  }
  return tps;
}

function getHistoryEntry(moveNumber) {
  if (gameHistory.length === 0) return null;
  let checkpoint = gameHistory[0];
  for (const entry of gameHistory) {
    if (entry.fullSnapshot && entry.moveNumber <= moveNumber) checkpoint = entry;
  }
  // fullSnapshot がない場合（ゲーム途中でリロードした場合など）は現在の盤面をスナップショットとして使う
  if (!checkpoint.fullSnapshot) {
    checkpoint = {
      moveNumber: checkpoint.moveNumber,
      fullSnapshot: {
        columns: state.columns.map(col => col.map(c => ({...c}))),
        stockLength: state.stock.length,
        foundationsLength: state.foundations.length,
      },
    };
  }
  let columns = checkpoint.fullSnapshot.columns.map(col => col.map(c => ({...c})));
  let stock = checkpoint.fullSnapshot.stock
    ? checkpoint.fullSnapshot.stock.map(pile => pile.map(c => ({...c})))
    : [];
  let stockLength = checkpoint.fullSnapshot.stockLength;
  let foundationsLength = checkpoint.fullSnapshot.foundationsLength;
  for (const entry of gameHistory) {
    if (entry.moveNumber <= checkpoint.moveNumber) continue;
    if (entry.moveNumber > moveNumber) break;
    if (entry.changedCols) {
      Object.entries(entry.changedCols).forEach(([ci, cards]) => {
        columns[parseInt(ci)] = cards.map(c => ({...c}));
      });
    }
    if (entry.type === 'deal' && stock.length > 0) stock.pop();
    if (entry.stockLength !== undefined) stockLength = entry.stockLength;
    if (entry.foundationsLength !== undefined) foundationsLength = entry.foundationsLength;
  }
  const histEntry = gameHistory.find(e => e.moveNumber === moveNumber) || gameHistory[gameHistory.length - 1];
  return { columns, stock, stockLength, foundationsLength, ...histEntry };
}

function renderPreviewBoard(entry) {
  if (!entry) return;
  const CARD_H = 100, DEFAULT_FD = 14, DEFAULT_FU = 30, MIN_FD = 7, MIN_FU = 16, availH = 360;
  let minScale = 1.0;
  entry.columns.forEach(col => {
    const nfd = col.filter(c => !c.faceUp).length;
    const nfu = col.filter(c =>  c.faceUp).length;
    const needed = nfd * DEFAULT_FD + nfu * DEFAULT_FU;
    if (needed > 0 && availH > CARD_H) { const sc = (availH - CARD_H) / needed; if (sc < minScale) minScale = sc; }
  });
  const FD = Math.max(MIN_FD, Math.floor(DEFAULT_FD * minScale));
  const FU = Math.max(MIN_FU, Math.floor(DEFAULT_FU * minScale));

  // Foundations
  const fEl = document.querySelector('.rv-preview-foundations');
  if (fEl) {
    fEl.innerHTML = '';
    for (let i = 0; i < 8; i++) {
      const s = document.createElement('div');
      s.className = 'foundation-slot' + (i < entry.foundationsLength ? ' filled' : '');
      s.style.cssText = 'width:38px;height:52px;font-size:1rem;';
      s.textContent = i < entry.foundationsLength ? '♠' : '♤';
      fEl.appendChild(s);
    }
  }
  // Columns
  const cEl = document.querySelector('.rv-preview-columns');
  if (!cEl) return;
  cEl.innerHTML = '';
  entry.columns.forEach(col => {
    const colEl = document.createElement('div');
    colEl.style.cssText = 'flex:1;min-width:0;max-width:72px;position:relative;min-height:120px;';
    const slot = document.createElement('div'); slot.className = 'column-slot'; colEl.appendChild(slot);
    let top = 0;
    col.forEach((card, ki) => {
      const isFront = (ki === col.length - 1);
      const el = document.createElement('div');
      el.className = 'card' + (!card.faceUp ? ' face-down' : '') + (isFront && card.faceUp ? ' card-front' : '');
      el.style.cssText = `top:${top}px;z-index:${ki+1};position:absolute;width:100%;height:${CARD_H}px;`;
      if (card.faceUp) {
        const r = isRed(card.suit); const cls = r ? 'red' : 'black';
        el.innerHTML = `<div class="card-top"><span class="card-top-rank ${cls}${card.rank==='10'?' rank-10':''}">${card.rank}</span><span class="card-top-suit ${cls}">${card.suit}</span></div><span class="card-center-suit ${cls}">${card.suit}</span>`;
      }
      top += card.faceUp ? FU : FD;
      colEl.appendChild(el);
    });
    colEl.style.height = (top + CARD_H) + 'px';
    cEl.appendChild(colEl);
  });
  // Scale
  const inner = document.querySelector('.rv-board-inner');
  const wrap  = document.querySelector('.rv-board-wrap');
  if (inner && wrap) {
    const wW = wrap.clientWidth || 375;
    const scale = Math.min(0.58, (wW - 8) / 720);
    inner.style.transform = `scale(${scale})`;
    inner.style.marginLeft = Math.max(0, (wW - 720 * scale) / 2) + 'px';
    const maxColH = Math.max(...entry.columns.map(col => {
      return col.filter(c => !c.faceUp).length * FD + col.filter(c => c.faceUp).length * FU + CARD_H;
    }), 120);
    wrap.style.height = Math.ceil((maxColH + 80) * scale) + 'px';
  }
}

    el.addEventListener('click', () => { reviewState.currentIdx = parseInt(el.dataset.move); refreshReview(); });

    if (reviewState.currentIdx > 0) { reviewState.currentIdx--; refreshReview(); }

  document.getElementById('rv-next')?.addEventListener('click', () => {
    if (reviewState.currentIdx < totalMoves) { reviewState.currentIdx++; refreshReview(); }

  document.querySelectorAll('.rv-ai-jump-chip[data-jump]').forEach(el => {
    el.addEventListener('click', () => { reviewState.currentIdx = parseInt(el.dataset.jump); refreshReview(); });

  document.getElementById('rv-retry-btn')?.addEventListener('click', () => retryGame());
  document.getElementById('rv-newgame-btn')?.addEventListener('click', () => { overlay.style.display = 'none'; newGame(); });
  renderPreviewBoard(getHistoryEntry(reviewState.currentIdx));
  const cached = reviewAiCache[reviewState.currentIdx];
  if (cached) {
    const aiText = document.getElementById('review-ai-text');
    if (aiText) { aiText.textContent = cached; aiText.style.display = 'block'; }
  }
}

function buildReviewContext(entry, prevEntry, moveNumber) {
  const isEn = currentLang === 'en';
  const total = gameHistory.length > 0 ? gameHistory[gameHistory.length - 1].moveNumber : 0;
  const resultLabel = reviewState?.result === 'clear'
    ? (isEn ? 'Clear' : 'クリア') : (isEn ? 'Give Up' : 'ギブアップ');
  const lines = isEn ? [
    '[Review Analysis Mode]',
    `Total moves: ${total}`,
    `Result: ${resultLabel}`,
    `Completed suits: ${state.foundations.length}/8`,
    '',
    `[Move in focus: Move ${moveNumber}]`,
    `Move: ${entry?.description || 'Game start'}`,
    `Empty cols: ${prevEntry?.metrics?.emptyColumns ?? '?'}→${entry?.metrics?.emptyColumns ?? '?'}`,
    `Face-down cards: ${prevEntry?.metrics?.hiddenCards ?? '?'}→${entry?.metrics?.hiddenCards ?? '?'}`,
    `Score: ${prevEntry?.metrics?.score ?? '?'}→${entry?.metrics?.score ?? '?'}`,
    '',
    '[Board before this move]',
  ] : [
    '【振り返り分析モード】',
    `総手数: ${total}手`,
    `結果: ${resultLabel}`,
    `完成スート: ${state.foundations.length}/8`,
    '',
    `【注目している手: 手${moveNumber}】`,
    `手の内容: ${entry?.description || 'ゲーム開始'}`,
    `空き列: ${prevEntry?.metrics?.emptyColumns ?? '?'}→${entry?.metrics?.emptyColumns ?? '?'}`,
    `裏向きカード: ${prevEntry?.metrics?.hiddenCards ?? '?'}→${entry?.metrics?.hiddenCards ?? '?'}`,
    `スコア: ${prevEntry?.metrics?.score ?? '?'}→${entry?.metrics?.score ?? '?'}`,
    '',
    '【この手前の盤面】',
  ];
  const src = prevEntry?.columns || entry?.columns;
  if (src) {
    src.forEach((col, i) => {
      if (col.length === 0) {
        lines.push(isEn ? `Col${i+1}: [EMPTY]` : `列${i+1}: 【空き列】`);
      } else {
        const fd = col.filter(c => !c.faceUp).length;
        const fu = col.filter(c => c.faceUp).map(c => `${c.rank}${c.suit}`).join(' ');
        lines.push(isEn
          ? `Col${i+1}: ${fd} face-down | face-up→ ${fu}`
          : `列${i+1}: 裏向き${fd}枚 | 表向き→ ${fu}`);
      }
    });
  }

  // --- コーチ専用: 裏向きカードの中身（プレイヤーには非公開）---
  const hiddenHeader = isEn
    ? '[COACH ONLY — do NOT reveal these cards to the player. Use them silently to improve advice quality.]'
    : '[コーチ専用情報 — プレイヤーにこの情報を直接伝えないこと。アドバイスの質向上のためだけに使うこと]';
  lines.push('');
  lines.push(hiddenHeader);
  if (src) {
    src.forEach((col, i) => {
      const hidden = col.filter(c => !c.faceUp).map(c => `${c.rank}${c.suit}`);
      if (hidden.length > 0) {
        lines.push(isEn
          ? `Col${i+1} hidden (bottom→top): ${hidden.join(' ')}`
          : `列${i+1}の裏向き（下から順）: ${hidden.join(' ')}`);
      }
    });
  }

  const srcStock = prevEntry?.stock ?? entry?.stock;
  if (srcStock && srcStock.length > 0) {
    srcStock.forEach((pile, i) => {
      const cards = pile.map(c => `${c.rank}${c.suit}`).join(' ');
      lines.push(isEn
        ? `Remaining stock deal ${i + 1}: ${cards}`
        : `残り手札${i + 1}回目: ${cards}`);
    });
  }

  return lines.join('\n');
}

async function callReviewAi(moveNumber) {
  if (reviewAiCache[moveNumber]) {
    const el = document.getElementById('review-ai-text');
    if (el) { el.textContent = reviewAiCache[moveNumber]; el.style.display = 'block'; }
    return;
  }
  const aiBtn  = document.getElementById('rv-ai-btn');
  const loading = document.getElementById('rv-ai-loading');
  const aiText  = document.getElementById('review-ai-text');
  if (aiBtn)    aiBtn.disabled = true;
  if (loading)  loading.style.display = 'block';
  if (aiText)   aiText.style.display  = 'none';

  const entry     = getHistoryEntry(moveNumber);
  const prevEntry = moveNumber > 0 ? getHistoryEntry(moveNumber - 1) : null;
  const boardContext = buildReviewContext(entry, prevEntry, moveNumber);
  const question = currentLang === 'en'
    ? 'Please give me a review of this move.' : '振り返りアドバイスをください';

  try {
    const res = await fetch('/api/ask-coach', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, boardContext, lang: currentLang, mode: 'review' }),
    });
    const data = await res.json();
    const reply = data.reply || (currentLang === 'en' ? 'No response from AI.' : 'AIからの応答がありませんでした');
    reviewAiCache[moveNumber] = reply;
    if (aiText) { aiText.textContent = reply; aiText.style.display = 'block'; }
  } catch (err) {
    console.error('callReviewAi error:', err);
    if (aiText) {
      aiText.textContent = currentLang === 'en' ? 'Error occurred.' : 'エラーが発生しました';
      aiText.style.display = 'block';
    }
  } finally {
    if (aiBtn)   aiBtn.disabled = false;
    if (loading) loading.style.display = 'none';
  }
}

// ============================================================
// AI COACH（ルールベース）
// ============================================================
// ── 盤面分析エンジン ──────────────────────────────────────

function analyzeBoardState() {
  const cols = state.columns;
  const allMoves = findAllMoves();
  const canDeal = state.stock.length > 0 && cols.every(c => c.length > 0);

  // 裏向きカード総数
  const totalFaceDown = cols.reduce((s, c) => s + c.filter(x => !x.faceUp).length, 0);
  // 空列数
  const emptyCols = cols.filter(c => c.length === 0).length;
  // 同スーツ連続手
  const sameSuitMoves = allMoves.filter(m => {
    const target = cols[m.toCol][cols[m.toCol].length - 1];
    return target && target.suit === cols[m.fromCol][m.fromKi].suit;
  });
  // 裏向きをめくれる手
  const flipMoves = allMoves.filter(m => {
    const src = cols[m.fromCol];
    return m.fromKi > 0 && !src[m.fromKi - 1].faceUp;
  });
  // 空列を作れる手
  const emptyColMoves = allMoves.filter(m => {
    return cols[m.fromCol].length === m.fromKi; // 列全体を移動
  }).filter(m => cols[m.fromCol].every(c => c.faceUp));

  return { allMoves, canDeal, totalFaceDown, emptyCols,
           sameSuitMoves, flipMoves, emptyColMoves };
}

// ── 最善手の文言生成 ──────────────────────────────────────

let coachHighlightTimer = null;

function clearCoachHighlight() {
  document.querySelectorAll('.card.coach-hint').forEach(el => el.classList.remove('coach-hint'));
  document.querySelectorAll('.card.coach-target').forEach(el => el.classList.remove('coach-target'));
  document.querySelectorAll('.column-slot.coach-target-empty').forEach(el => el.classList.remove('coach-target-empty'));
  clearTimeout(coachHighlightTimer);
}

function highlightCoachMove(best) {
  clearCoachHighlight();
  if (!best) return;

  requestAnimationFrame(() => {
    // 移動元カードをハイライト
    const colEls = document.querySelectorAll('.column');
    const fromColEl = colEls[best.fromCol];
    if (fromColEl) {
      const cards = fromColEl.querySelectorAll('.card');
      // fromKi以降のカードすべてをハイライト
      for (let i = best.fromKi; i < state.columns[best.fromCol].length; i++) {
        if (cards[i]) cards[i].classList.add('coach-hint');
      }
    }

    // 移動先をハイライト
    const toColEl = colEls[best.toCol];
    if (toColEl) {
      const toCards = toColEl.querySelectorAll('.card');
      if (toCards.length > 0) {
        toCards[toCards.length - 1].classList.add('coach-target');
      } else {
        const slot = toColEl.querySelector('.column-slot');
        if (slot) slot.classList.add('coach-target-empty');
      }
    }

    // 8秒後に自動解除
    coachHighlightTimer = setTimeout(clearCoachHighlight, 8000);
  });
}

function adviceBestMove() {
  const { allMoves, canDeal, sameSuitMoves, flipMoves, emptyColMoves } = analyzeBoardState();

  if (allMoves.length === 0 && !canDeal) {
    clearCoachHighlight();
    return '⚠️ 有効な手がありません。↩ 戻すボタンで手を戻してみましょう。';
  }

  const best = pickBestMove(allMoves);

  // bestがnull = 有効手はあるが価値のある手がない → 山札補充を優先
  if (!best) {
    clearCoachHighlight();
    if (canDeal) {
      return '🃏 今は動かす価値のある手がありません。\n山札を配って新しい選択肢を作りましょう。';
    }
    return '⚠️ 有効な手はありますが、どれも局面を改善しません。↩ 戻すボタンで数手前に戻ることをお勧めします。';
  }

  // ハイライト
  highlightCoachMove(best);

  const card   = state.columns[best.fromCol][best.fromKi];
  const target = state.columns[best.toCol][state.columns[best.toCol].length - 1];

  let reason = '';
  const makesEmpty = state.columns[best.fromCol].slice(0, best.fromKi).length === 0;
  const flipsCard = state.columns[best.fromCol].slice(0, best.fromKi).length > 0
    && !state.columns[best.fromCol][best.fromKi - 1]?.faceUp;

  if (makesEmpty) {
    reason = `この列が空になります！空き列はカードの中継地点として非常に重要です。`;
  } else if (!target && flipsCard) {
    reason = `空列に移動することで裏向きカードがめくれ、選択肢が広がります。`;
  } else if (flipsCard && sameSuitMoves.includes(best)) {
    reason = `同じ${card.suit}スーツに繋げつつ、裏向きカードもめくれる一石二鳥の手です。`;
  } else if (flipsCard) {
    reason = `この移動で裏向きカードが1枚めくれ、選択肢が広がります。`;
  } else if (sameSuitMoves.includes(best)) {
    reason = `同じ${card.suit}スーツに繋げられるので、セット完成に近づきます。`;
  } else if (!target) {
    reason = `空列への移動です。Kから始まる整理ができます。`;
  } else {
    reason = `順番に並べて後のセット完成に備えます。`;
  }

  const moving = state.columns[best.fromCol].slice(best.fromKi).map(c => `${c.rank}${c.suit}`).join('→');
  return `👆 光っているカード（${moving}）を${target ? target.rank + target.suit + 'の上' : '空列'}へ。\n${reason}`;
}

// ── クリア可能性の評価 ────────────────────────────────────

function adviceClearability() {
  const { allMoves, canDeal, totalFaceDown, emptyCols, sameSuitMoves } = analyzeBoardState();
  const cols = state.columns;

  // スーツごとの表向きカード枚数を集計
  const suitCount = {};
  SUITS.forEach(s => suitCount[s] = 0);
  cols.forEach(col => col.forEach(c => { if (c.faceUp) suitCount[c.suit]++; }));
  const minSuit = Math.min(...Object.values(suitCount));

  let assessment = '';
  let detail = '';

  if (allMoves.length === 0 && !canDeal) {
    assessment = '❌ 現状ではクリア不可能です。';
    detail = '有効な手がなく、山札も補充できません。';
  } else if (totalFaceDown === 0 && allMoves.length > 0) {
    assessment = '✅ クリアの可能性が高いです！';
    detail = `裏向きカードがすべてめくれています。有効手も${allMoves.length}手あります。集中してスーツを揃えましょう。`;
  } else if (state.stock.length >= 2 && totalFaceDown <= 10) {
    assessment = '🟡 まだ十分クリアできます。';
    detail = `山札が${state.stock.length}回残っており、裏向きカードも${totalFaceDown}枚と少ないです。`;
  } else if (state.stock.length === 0 && allMoves.length <= 3 && totalFaceDown > 8) {
    assessment = '🔴 かなり厳しい局面です。';
    detail = `山札がなく、裏向きカードが${totalFaceDown}枚残っています。有効手も${allMoves.length}手しかありません。`;
  } else {
    assessment = '🟡 まだ可能性はあります。';
    detail = `有効手${allMoves.length}手、裏向きカード${totalFaceDown}枚、山札${state.stock.length}回。`;
  }

  const sameSuitPct = allMoves.length > 0 ? Math.round(sameSuitMoves.length / allMoves.length * 100) : 0;
  const tip = sameSuitPct >= 50
    ? `有効手の${sameSuitPct}%が同スーツ接続です。積極的に狙いましょう。`
    : `同スーツに繋げられる手が少ないです。まず裏向きカードをめくることを優先してください。`;

  return `${assessment}\n${detail}\n\n💡 ${tip}`;
}

// ── 戻すべき手数の提案 ────────────────────────────────────

function adviceRewind() {
  if (state.history.length === 0) {
    return '履歴がないため、戻せません。';
  }

  const { allMoves } = analyzeBoardState();
  const { totalFaceDown } = analyzeBoardState();

  const steps = Math.min(5, state.history.length);
  return `⏪ ↩ 戻すボタンで${steps}手ほど前に戻ることをおすすめします。\n有効な手が見つかる地点まで遡って、違うルートを試してみましょう。\n\n現在の局面：有効手${allMoves.length}手・裏向き${totalFaceDown}枚`;
}

// ── 局面解説 ─────────────────────────────────────────────

function adviceExplain() {
  const { allMoves, canDeal, totalFaceDown, emptyCols, sameSuitMoves, flipMoves } = analyzeBoardState();
  const cols = state.columns;

  // 最も有望な列（表向きが多く、同スーツが揃っている）
  const colScores = cols.map((col, i) => {
    const faceUp = col.filter(c => c.faceUp);
    const suits = faceUp.map(c => c.suit);
    const dominant = suits.sort((a,b) => suits.filter(x=>x===b).length - suits.filter(x=>x===a).length)[0];
    const sameCount = suits.filter(s => s === dominant).length;
    return { i, faceUp: faceUp.length, sameCount, faceDown: col.filter(c=>!c.faceUp).length };
  });
  const bestCol = colScores.sort((a,b) => b.sameCount - a.sameCount)[0];
  const worstCol = colScores.sort((a,b) => b.faceDown - a.faceDown)[0];

  const lines = [
    `📊 現在の局面サマリー`,
    `・有効手: ${allMoves.length}手（うち同スーツ接続: ${sameSuitMoves.length}手）`,
    `・裏向きカード: ${totalFaceDown}枚 / 空列: ${emptyCols}列`,
    `・山札: 残り${state.stock.length}回 / 完成セット: ${state.foundations.length}/8`,
    ``,
    `🎯 注目ポイント`,
    `・列${bestCol.i+1}は同スーツが${bestCol.sameCount}枚揃っていて有望です`,
    worstCol.faceDown > 0
      ? `・列${worstCol.i+1}に裏向きが${worstCol.faceDown}枚あります。優先してめくりましょう`
      : `・すべての裏向きカードがめくれています！`,
    flipMoves.length > 0
      ? `・今すぐ裏向きをめくれる手が${flipMoves.length}手あります` : '',
  ].filter(Boolean);

  return lines.join('\n');
}

// ── 質問のルーティング ────────────────────────────────────

function routeQuestion(msg) {
  const m = msg.replace(/\s/g, '');
  if (/どうすべき|何をすれ|次の手|おすすめ|ベスト|最善/.test(m)) return adviceBestMove();
  if (/クリア|可能性|勝て|諦め|いける/.test(m)) return adviceClearability();
  if (/戻す|巻き戻|何手|どこまで/.test(m)) return adviceRewind();
  if (/解説|説明|状況|局面|サマリ|分析/.test(m)) return adviceExplain();
  // デフォルト：総合アドバイス
  return adviceBestMove() + '\n\n' + adviceClearability();
}

  const hiddenHeader = currentLang === 'en'

  lines.push('');
  lines.push(hiddenHeader);

  state.columns.forEach((col, i) => {
    const hidden = col.filter(c => !c.faceUp).map(c => `${c.rank}${c.suit}`);
    if (hidden.length > 0) {
      lines.push(currentLang === 'en'
        ? `Col${i + 1} hidden (bottom→top): ${hidden.join(' ')}`
        : `列${i + 1}の裏向き（下から順）: ${hidden.join(' ')}`);
    }
  });

  state.stock.forEach((pile, i) => {
    const cards = pile.map(c => `${c.rank}${c.suit}`).join(' ');
    lines.push(currentLang === 'en'
      ? `Stock deal ${i + 1}: ${cards}`
      : `手札${i + 1}回目: ${cards}`);
  });

  return lines.join('\n');
}

async function askAi(question) {
  gtag('event', 'coach_used', { question });
  const box  = document.getElementById('ai-advice-box');
  const text = document.getElementById('ai-advice-text');

  document.querySelectorAll('.ai-quick').forEach(b => {
    b.style.background = b.textContent.includes(question.slice(0, 4))
      ? 'rgba(201,168,76,0.3)' : '';
  });

  text.textContent = t('toast.thinking');
  box.classList.add('open');

  try {
    const res = await fetch('/api/ask-coach', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question, boardContext: buildBoardContext(), lang: currentLang }),
    });
    const data = await res.json();
    text.textContent = data.reply || t('toast.aiError');
  } catch (e) {
    text.textContent = t('toast.netError');
  } finally {
    document.querySelectorAll('.ai-quick').forEach(b => b.style.background = '');
  }
}

function closeAdvice() {
  document.getElementById('ai-advice-box').classList.remove('open');
  clearCoachHighlight();
}

// ============================================================
// AI BAR RESIZE
// ============================================================
const AI_HEIGHT_KEY = 'spider_ai_height_v1';
const AI_MIN_H = 80;
function getAiMaxH() { return Math.floor(window.innerHeight * 0.7); }
let aiResizeState = null;

function applyAiHeight(h) {
  document.getElementById('ai-bar').style.height = h + 'px';
  document.getElementById('app').style.paddingBottom = h + 'px';
}

function initAiResize() {
  const saved = parseInt(localStorage.getItem(AI_HEIGHT_KEY));
  if (saved && saved >= AI_MIN_H) {
    applyAiHeight(saved);
  } else {
    // 初回：自然な高さに合わせてパディングを設定
    const naturalH = document.getElementById('ai-bar').offsetHeight;
    document.getElementById('app').style.paddingBottom = naturalH + 'px';
  }

  document.getElementById('ai-resize-handle').addEventListener('pointerdown', e => {
    e.preventDefault();
    aiResizeState = {
      startY: e.clientY,
      startH: document.getElementById('ai-bar').offsetHeight,
    };
    document.addEventListener('pointermove', onAiResizeMove, { passive: false });
    document.addEventListener('pointerup', onAiResizeEnd);
  });
}

function onAiResizeMove(e) {
  if (!aiResizeState) return;
  e.preventDefault();
  const delta = aiResizeState.startY - e.clientY; // 上にドラッグ = 高さ増加
  const newH = Math.min(getAiMaxH(), Math.max(AI_MIN_H, aiResizeState.startH + delta));
  applyAiHeight(newH);
}

function onAiResizeEnd() {
  if (!aiResizeState) return;
  localStorage.setItem(AI_HEIGHT_KEY, document.getElementById('ai-bar').offsetHeight);
  aiResizeState = null;
  document.removeEventListener('pointermove', onAiResizeMove);
  document.removeEventListener('pointerup', onAiResizeEnd);
}

  const _ld = parseInt(localStorage.getItem(DIFFICULTY_KEY) || '');
  if (_ld === 1 || _ld === 2 || _ld === 4) currentDifficulty = _ld;
  if (_launchMode === 'today') {
    launchTodayChallenge();
  } else {
    newGame();
  }
} else if (!loadGameState()) {
  // 中断セーブがなければスタート画面を表示
  const savedDiff = parseInt(localStorage.getItem(DIFFICULTY_KEY) || '');
  if (savedDiff === 1 || savedDiff === 2 || savedDiff === 4) currentDifficulty = savedDiff;
  showStartScreen();
}

// タブ非表示/アプリ切り替え時にタイマーを停止し状態を保存、
// 復帰時はタイマーを再開（隠れていた時間はカウントしない）
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
    saveGameState();
  } else if (!state.gameOver && state.startTime) {
    // 隠れていた時間を除いてstartTimeを再設定
    try {
      const saved = JSON.parse(localStorage.getItem(GAME_STATE_KEY));
      if (saved?.elapsed !== undefined) {
        state.startTime = Date.now() - saved.elapsed * 1000;
      }
    } catch(e) {}
    if (!state.timerInterval) {
      state.timerInterval = setInterval(updateTimer, 1000);
    }
  }
});

// ============================================================
// iOS PWA インストールバナー
// ============================================================
const PWA_BANNER_KEY = 'pwa_banner_dismissed';

function isIosSafari() {
  const ua = navigator.userAgent;
  const isIos = /iP(hone|ad|od)/.test(ua);
  const isStandalone = navigator.standalone === true;
  // Safari かどうか（Chrome/Firefox/Line等を除外）
  const isSafari = /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS|OPiOS|GSA/.test(ua);
  return isIos && isSafari && !isStandalone;
}

function dismissPwaBanner() {
  const banner = document.getElementById('pwa-banner');
  banner.classList.remove('visible');
  localStorage.setItem(PWA_BANNER_KEY, Date.now().toString());
}

function initPwaBanner() {
  if (!isIosSafari()) return;

  const dismissed = localStorage.getItem(PWA_BANNER_KEY);
  if (dismissed) {
    const days = (Date.now() - parseInt(dismissed, 10)) / (1000 * 60 * 60 * 24);
    if (days < 14) return;
  }

  setTimeout(() => {
    document.getElementById('pwa-banner').classList.add('visible');
  }, 3000);
}

applyLang();
initPwaBanner();

// ============================================================
// PWA: Service Worker 登録
// ============================================================
if ('serviceWorker' in navigator) {
  // Chrome のネイティブドラッグによるテキスト選択を全域で防止
  document.addEventListener('dragstart', e => e.preventDefault());

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .catch(err => console.warn('SW registration failed:', err));
  });
}
